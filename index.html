<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saturday v20</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { background-color: #09090b; color: #fafafa; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
    .glass-card { background: rgba(39, 39, 42, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; }
    .hidden-view { display: none !important; }
    .task-item { transition: all 0.2s ease; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
    .task-item:hover { background: rgba(255, 255, 255, 0.02); }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
  </style>
</head>
<body class="antialiased">

  <div id="auth-view" class="min-h-screen flex items-center justify-center bg-[#09090b]">
    <div class="w-full max-w-md mx-4 glass-card p-8 text-center">
      <div class="flex items-center justify-center gap-3 mb-6">
        <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-purple-600 to-blue-500 flex items-center justify-center shadow-lg">
          <span class="text-white font-bold text-xl">S</span>
        </div>
        <span class="text-2xl font-bold tracking-tight">Saturday</span>
      </div>
      <h2 class="text-xl font-semibold mb-6" id="auth-title">Entrar no Gestor</h2>
      
      <form id="auth-form" class="space-y-4">
        <input type="email" id="auth-email" placeholder="Seu email" required class="w-full p-3 rounded-xl bg-white/5 border border-white/10 text-white focus:outline-none focus:border-purple-500 transition-all" />
        <input type="password" id="auth-password" placeholder="Sua senha" required class="w-full p-3 rounded-xl bg-white/5 border border-white/10 text-white focus:outline-none focus:border-purple-500 transition-all" />
        <div id="auth-error" class="text-red-500 text-sm"></div>
        <button type="submit" id="btn-submit" class="w-full p-3 rounded-xl bg-purple-600 hover:bg-purple-500 text-white font-medium transition-all">Entrar</button>
      </form>
      
      <button id="btn-google" class="w-full mt-4 p-3 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center gap-2 hover:bg-white/10 transition-all">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Google
      </button>
      
      <button id="btn-toggle-auth" class="mt-6 text-sm text-gray-500 hover:text-purple-400">Não tem conta? Criar agora</button>
    </div>
  </div>

  <div id="app-view" class="hidden-view min-h-screen flex bg-[#09090b]">
    
    <aside class="w-64 border-r border-white/5 p-6 flex flex-col hidden md:flex">
      <div class="flex items-center gap-3 mb-10">
        <div class="w-8 h-8 rounded-lg bg-purple-600 flex items-center justify-center text-xs font-bold">S</div>
        <span class="font-bold">Saturday</span>
      </div>
      <nav class="flex-1 space-y-2">
        <div class="p-3 bg-purple-500/10 text-purple-400 rounded-xl flex items-center gap-3"><i data-lucide="layout"></i> Boards</div>
        <div class="p-3 text-gray-500 hover:text-white transition-all flex items-center gap-3 cursor-pointer"><i data-lucide="users"></i> Time</div>
      </nav>
      <button id="btn-logout" class="p-3 text-red-400 hover:bg-red-500/10 rounded-xl flex items-center gap-3 transition-all">
        <i data-lucide="log-out"></i> Sair
      </button>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
      <header class="h-16 border-b border-white/5 flex items-center justify-between px-8">
        <h2 class="font-semibold">Meu Board de Tarefas</h2>
        <div id="user-display" class="text-sm text-gray-400 font-medium"></div>
      </header>

      <section class="p-8 bg-white/[0.02] border-b border-white/5">
        <form id="task-form" class="flex gap-4 max-w-4xl">
          <input type="text" id="task-input" placeholder="+ Adicionar nova tarefa..." required 
            class="flex-1 p-3 rounded-xl bg-white/5 border border-white/10 focus:outline-none focus:border-purple-500 transition-all" />
          <select id="task-priority" class="bg-white/5 border border-white/10 rounded-xl px-4 text-sm outline-none focus:border-purple-500">
            <option value="Baixa" class="bg-gray-900">Baixa</option>
            <option value="Média" class="bg-gray-900" selected>Média</option>
            <option value="Alta" class="bg-gray-900">Alta</option>
          </select>
          <button type="submit" class="bg-purple-600 hover:bg-purple-500 px-6 py-3 rounded-xl font-bold transition-all flex items-center gap-2">
            <i data-lucide="plus" class="w-4 h-4"></i> Lançar
          </button>
        </form>
      </section>

      <section class="flex-1 overflow-y-auto p-8">
        <div class="glass-card overflow-hidden">
          <div class="grid grid-cols-12 p-4 bg-white/5 text-xs font-bold uppercase tracking-wider text-gray-500">
            <div class="col-span-7 px-2">Tarefa</div>
            <div class="col-span-2 px-2 text-center">Prioridade</div>
            <div class="col-span-2 px-2 text-center">Status</div>
            <div class="col-span-1 px-2 text-right">Ação</div>
          </div>
          <div id="task-list">
            <div class="p-10 text-center text-gray-600">Carregando tarefas...</div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCGemp_OA8savCmLZfX7Us0nmDpdbpv4N0",
      authDomain: "mytasks-saturday.firebaseapp.com",
      projectId: "mytasks-saturday",
      storageBucket: "mytasks-saturday.firebasestorage.app",
      messagingSenderId: "647554172397",
      appId: "1:647554172397:web:aac3ef00938ee7cd8f13e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    let currentUser = null;

    // --- Lógica de Autenticação ---
    const authForm = document.getElementById('auth-form');
    const authView = document.getElementById('auth-view');
    const appView = document.getElementById('app-view');

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        authView.classList.add('hidden-view');
        appView.classList.remove('hidden-view');
        document.getElementById('user-display').innerText = user.email;
        loadTasks();
        lucide.createIcons();
      } else {
        authView.classList.remove('hidden-view');
        appView.classList.add('hidden-view');
      }
    });

    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (err) { alert("Erro ao entrar: " + err.message); }
    });

    document.getElementById('btn-google').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('btn-logout').onclick = () => signOut(auth);

    // --- Lógica de Tarefas (O Core do Sistema) ---
    const taskForm = document.getElementById('task-form');
    const taskInput = document.getElementById('task-input');
    const taskPriority = document.getElementById('task-priority');
    const taskList = document.getElementById('task-list');

    // Lançar atividade
    taskForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = taskInput.value;
      const priority = taskPriority.value;

      try {
        await addDoc(collection(db, "tasks"), {
          text: text,
          priority: priority,
          status: "Pendente",
          userId: currentUser.uid,
          createdAt: Date.now()
        });
        taskInput.value = '';
      } catch (err) { console.error("Erro ao salvar:", err); }
    });

    // Carregar em tempo real (onSnapshot)
    function loadTasks() {
      const q = query(
        collection(db, "tasks"), 
        where("userId", "==", currentUser.uid),
        orderBy("createdAt", "desc")
      );

      onSnapshot(q, (snapshot) => {
        taskList.innerHTML = '';
        if (snapshot.empty) {
          taskList.innerHTML = '<div class="p-10 text-center text-gray-600 italic">Nenhuma atividade lançada.</div>';
          return;
        }

        snapshot.forEach((docSnap) => {
          const task = docSnap.data();
          const id = docSnap.id;
          
          const priorityColor = task.priority === 'Alta' ? 'text-red-400 bg-red-400/10' : 
                                task.priority === 'Média' ? 'text-yellow-400 bg-yellow-400/10' : 'text-blue-400 bg-blue-400/10';

          const html = `
            <div class="grid grid-cols-12 p-4 task-item items-center animate-in">
              <div class="col-span-7 px-2 font-medium text-gray-200">${task.text}</div>
              <div class="col-span-2 px-2 text-center">
                <span class="text-[10px] px-2 py-1 rounded-full font-bold uppercase ${priorityColor}">${task.priority}</span>
              </div>
              <div class="col-span-2 px-2 text-center">
                <button onclick="toggleStatus('${id}', '${task.status}')" class="text-xs ${task.status === 'Concluído' ? 'text-emerald-400' : 'text-gray-500'} hover:underline">
                  ${task.status}
                </button>
              </div>
              <div class="col-span-1 px-2 text-right">
                <button onclick="deleteTask('${id}')" class="text-gray-600 hover:text-red-500 transition-colors">
                   <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
              </div>
            </div>
          `;
          taskList.innerHTML += html;
        });
        lucide.createIcons();
      });
    }

    // Funções Globais (para os botões gerados dinamicamente)
    window.deleteTask = async (id) => {
      if(confirm("Excluir tarefa?")) await deleteDoc(doc(db, "tasks", id));
    };

    window.toggleStatus = async (id, current) => {
      const newStatus = current === 'Pendente' ? 'Concluído' : 'Pendente';
      await updateDoc(doc(db, "tasks", id), { status: newStatus });
    };

  </script>
</body>
</html>
