<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saturday v22 - Gestor Makro</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --makro-red: #ED1C24;
      --makro-bg: #010816;
      --makro-card: rgba(255, 255, 255, 0.05);
    }
    body { 
      background-color: var(--makro-bg); 
      color: #f1f5f9; 
      font-family: 'Montserrat', sans-serif; 
      margin: 0; 
      overflow: hidden; 
    }
    .glass-card { 
      background: var(--makro-card); 
      backdrop-filter: blur(12px); 
      border: 1px solid rgba(255, 255, 255, 0.1); 
      border-radius: 1.5rem; 
    }
    .hidden-view { display: none !important; }
    
    /* Scrollbar Personalizada do Painel NPS */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--makro-red); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fadeup { animation: fadeUp 0.4s ease forwards; }

    /* Kanban Drag & Drop Styles */
    .kanban-column {
      min-height: 500px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 1.5rem;
      border: 2px dashed transparent;
      transition: all 0.3s ease;
    }
    .kanban-column.drag-over {
      background: rgba(237, 28, 36, 0.05);
      border-color: var(--makro-red);
    }
    .draggable-card {
      cursor: grab;
      transition: transform 0.2s, opacity 0.2s;
    }
    .draggable-card:active { cursor: grabbing; }
    .dragging { opacity: 0.4; transform: scale(0.95); }

    /* Inputs Estilo Painel NPS */
    input, select, textarea {
      background: rgba(255, 255, 255, 0.05) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      color: white !important;
      outline: none !important;
      transition: all 0.3s;
    }
    input:focus, select:focus {
      border-color: var(--makro-red) !important;
      box-shadow: 0 0 0 2px rgba(237, 28, 36, 0.2);
    }

    #mobile-menu { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(-100%); }
    #mobile-menu.open { transform: translateX(0); }
  </style>
</head>
<body class="antialiased">

  <div id="toast-container" class="fixed bottom-8 right-8 z-[200]"></div>

  <div id="menu-overlay" class="hidden-view fixed inset-0 bg-black/80 backdrop-blur-sm z-[90]"></div>

  <aside id="mobile-menu" class="fixed inset-y-0 left-0 w-80 bg-[#010816] border-r border-white/10 p-8 flex flex-col z-[100] lg:hidden">
    <div class="flex items-center justify-between mb-12">
      <img src="https://makroengenharia.com.br/wp-content/uploads/2023/03/logo-1.png" class="h-8">
      <button id="close-menu" class="p-2 text-gray-500 hover:text-white"><i data-lucide="x"></i></button>
    </div>
    <nav class="flex-1 space-y-4">
      <div onclick="changeView('list'); toggleMenu(false)" class="nav-item-list p-4 bg-red-600/10 text-red-500 rounded-2xl flex items-center gap-4 cursor-pointer font-bold uppercase text-xs tracking-widest"><i data-lucide="list"></i> Lista</div>
      <div onclick="changeView('kanban'); toggleMenu(false)" class="nav-item-kanban p-4 text-gray-500 hover:text-white transition-all flex items-center gap-4 cursor-pointer font-bold uppercase text-xs tracking-widest"><i data-lucide="columns"></i> Kanban</div>
    </nav>
    <button onclick="handleLogout()" class="p-4 text-red-500/60 hover:text-red-500 flex items-center gap-4 transition-all mt-auto font-black uppercase text-xs tracking-[3px]">
      <i data-lucide="log-out"></i> Sair
    </button>
  </aside>

  <div id="auth-view" class="min-h-screen flex items-center justify-center bg-[#010816]">
    <div class="w-full max-w-md mx-4 glass-card p-12 text-center animate-fadeup">
      <img src="https://makroengenharia.com.br/wp-content/uploads/2023/03/logo-1.png" class="h-12 mx-auto mb-10">
      <h2 class="text-2xl font-black mb-8 tracking-tighter uppercase">Acesso ao Gestor</h2>
      <form id="auth-form" class="space-y-4 text-left">
        <input type="email" id="auth-email" placeholder="E-mail corporativo" required class="w-full p-4 rounded-2xl" />
        <input type="password" id="auth-password" placeholder="Senha" required class="w-full p-4 rounded-2xl" />
        <button type="submit" id="btn-submit" class="w-full bg-red-600 p-5 rounded-2xl font-black uppercase hover:bg-red-700 shadow-xl shadow-red-600/20 active:scale-95 transition-all mt-4 text-white">Entrar</button>
      </form>
      <div class="relative my-8"><div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div><div class="relative flex justify-center text-[10px] uppercase font-bold"><span class="bg-[#010816] px-4 text-gray-500 tracking-widest">Ou continue com</span></div></div>
      <button id="btn-google" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center gap-3 hover:bg-white/10 transition-all font-bold uppercase text-xs tracking-widest"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Google</button>
    </div>
  </div>

  <div id="app-view" class="hidden-view min-h-screen flex flex-col bg-[#010816]">
    
    <header class="h-20 border-b border-white/5 flex items-center justify-between px-6 lg:px-12 bg-black/20 backdrop-blur-md sticky top-0 z-50">
      <div class="flex items-center gap-6">
         <button id="open-menu" class="lg:hidden p-2 text-gray-400 hover:text-white transition-colors"><i data-lucide="menu"></i></button>
         <img src="https://makroengenharia.com.br/wp-content/uploads/2023/03/logo-1.png" class="h-8 hidden md:block">
         <div class="h-6 w-[1px] bg-white/10 hidden md:block"></div>
         <h2 class="font-black uppercase tracking-[3px] text-xs opacity-60">Meu Board de Tarefas</h2>
      </div>
      
      <div class="flex items-center gap-6">
        <div class="hidden md:flex bg-white/5 rounded-2xl p-1.5 border border-white/10">
          <button onclick="changeView('list')" id="toggle-list" class="p-2 px-6 rounded-xl bg-red-600 text-white text-[10px] font-black uppercase tracking-widest flex items-center gap-2 transition-all shadow-lg shadow-red-600/20"><i data-lucide="list" class="w-4 h-4"></i> Lista</button>
          <button onclick="changeView('kanban')" id="toggle-kanban" class="p-2 px-6 rounded-xl text-gray-500 text-[10px] font-black uppercase tracking-widest flex items-center gap-2 transition-all hover:text-white"><i data-lucide="columns" class="w-4 h-4"></i> Kanban</button>
        </div>
        <div id="user-display" class="flex items-center gap-4">
          <div class="text-right hidden sm:block">
            <p id="user-email" class="text-xs font-black uppercase tracking-tighter text-gray-200"></p>
            <p class="text-[9px] text-red-500 font-bold uppercase tracking-[2px]">Analista Makro</p>
          </div>
          <div id="user-avatar" class="w-10 h-10 rounded-2xl bg-red-600 flex items-center justify-center text-sm font-black text-white border border-white/10 shadow-lg shadow-red-600/20">?</div>
        </div>
      </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
      <aside class="w-64 border-r border-white/5 p-8 flex flex-col hidden lg:flex bg-black/10">
        <nav class="flex-1 space-y-3">
          <div onclick="changeView('list')" class="nav-item-list p-4 bg-red-600/10 text-red-500 rounded-2xl flex items-center gap-4 cursor-pointer font-bold uppercase text-[10px] tracking-[2px] transition-all"><i data-lucide="list" class="w-4 h-4"></i> Lista</div>
          <div onclick="changeView('kanban')" class="nav-item-kanban p-4 text-gray-500 hover:text-white transition-all flex items-center gap-4 cursor-pointer font-bold uppercase text-[10px] tracking-[2px]"><i data-lucide="columns" class="w-4 h-4"></i> Kanban</div>
          <div class="p-4 text-gray-700 cursor-not-allowed flex items-center gap-4 font-bold uppercase text-[10px] tracking-[2px]"><i data-lucide="users" class="w-4 h-4"></i> Equipe</div>
        </nav>
        <button onclick="handleLogout()" class="p-4 text-gray-500 hover:text-red-500 flex items-center gap-4 transition-all font-black uppercase text-[10px] tracking-[3px] mt-auto">
          <i data-lucide="log-out" class="w-4 h-4"></i> Sair
        </button>
      </aside>

      <main class="flex-1 flex flex-col overflow-hidden">
        
        <section class="p-8 bg-white/[0.02] border-b border-white/5">
          <form id="task-form" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-6 max-w-full">
            <div class="lg:col-span-2">
              <label class="text-[9px] font-black uppercase opacity-30 mb-2 block tracking-widest">O que precisa ser feito?</label>
              <input type="text" id="task-input" placeholder="Ex: Analisar relatório MAKRO..." required class="w-full p-4 rounded-2xl text-sm" />
            </div>
            <div>
              <label class="text-[9px] font-black uppercase opacity-30 mb-2 block tracking-widest">Solicitante</label>
              <input type="text" id="task-requester" placeholder="Quem solicitou?" required class="w-full p-4 rounded-2xl text-sm" />
            </div>
            <div>
              <label class="text-[9px] font-black uppercase opacity-30 mb-2 block tracking-widest">Prazo Final</label>
              <input type="date" id="task-deadline" required class="w-full p-4 rounded-2xl text-sm" />
            </div>
            <div>
              <label class="text-[9px] font-black uppercase opacity-30 mb-2 block tracking-widest">Nível de Urgência</label>
              <select id="task-urgency" class="w-full p-4 rounded-2xl text-sm cursor-pointer">
                <option value="1" class="bg-[#010816]">Nível 1 (Baixo)</option>
                <option value="2" class="bg-[#010816]">Nível 2 (Médio)</option>
                <option value="3" class="bg-[#010816]">Nível 3 (Crítico)</option>
              </select>
            </div>
            <div class="flex items-end">
              <button type="submit" class="w-full bg-red-600 hover:bg-red-700 p-4 rounded-2xl font-black uppercase text-xs tracking-widest text-white transition-all shadow-xl shadow-red-600/10 active:scale-95 flex items-center justify-center gap-2">
                <i data-lucide="plus" class="w-4 h-4"></i> Criar
              </button>
            </div>
          </form>
        </section>

        <div id="view-container" class="flex-1 overflow-y-auto p-8 custom-scrollbar">
          
          <div id="list-view" class="animate-fadeup">
            <div class="glass-card overflow-hidden border-white/5">
              <div class="grid grid-cols-12 p-5 bg-white/5 text-[9px] font-black uppercase tracking-[3px] text-gray-500 border-b border-white/5">
                <div class="col-span-5 md:col-span-6 px-2">Atividade / Solicitante</div>
                <div class="col-span-2 px-2 text-center">Urgência</div>
                <div class="col-span-2 px-2 text-center">Prazo</div>
                <div class="col-span-2 px-2 text-center">Status</div>
                <div class="col-span-1 px-2 text-right"></div>
              </div>
              <div id="task-list-content" class="divide-y divide-white/5"></div>
            </div>
          </div>

          <div id="kanban-view" class="hidden-view h-full animate-fadeup">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 h-full min-h-[600px]">
              <div class="flex flex-col h-full">
                <div class="flex items-center justify-between mb-6 px-4">
                  <div class="flex items-center gap-3">
                    <span class="w-3 h-3 rounded-full bg-gray-500 shadow-lg shadow-gray-500/20"></span>
                    <h3 class="font-black text-[11px] uppercase tracking-[4px] text-gray-400">Pendente</h3>
                  </div>
                  <span id="count-Pendente" class="text-[10px] font-black bg-white/5 px-3 py-1 rounded-full text-gray-500">0</span>
                </div>
                <div id="kanban-Pendente" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="handleDrop(event, 'Pendente')" class="kanban-column p-4 space-y-4 overflow-y-auto flex-1 custom-scrollbar"></div>
              </div>
              <div class="flex flex-col h-full">
                <div class="flex items-center justify-between mb-6 px-4">
                  <div class="flex items-center gap-3">
                    <span class="w-3 h-3 rounded-full bg-blue-500 shadow-lg shadow-blue-500/20"></span>
                    <h3 class="font-black text-[11px] uppercase tracking-[4px] text-gray-400">Em Andamento</h3>
                  </div>
                  <span id="count-Andamento" class="text-[10px] font-black bg-white/5 px-3 py-1 rounded-full text-gray-500">0</span>
                </div>
                <div id="kanban-Andamento" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="handleDrop(event, 'Em Andamento')" class="kanban-column p-4 space-y-4 overflow-y-auto flex-1 custom-scrollbar"></div>
              </div>
              <div class="flex flex-col h-full">
                <div class="flex items-center justify-between mb-6 px-4">
                  <div class="flex items-center gap-3">
                    <span class="w-3 h-3 rounded-full bg-emerald-500 shadow-lg shadow-emerald-500/20"></span>
                    <h3 class="font-black text-[11px] uppercase tracking-[4px] text-gray-400">Concluído</h3>
                  </div>
                  <span id="count-Concluido" class="text-[10px] font-black bg-white/5 px-3 py-1 rounded-full text-gray-500">0</span>
                </div>
                <div id="kanban-Concluido" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="handleDrop(event, 'Concluído')" class="kanban-column p-4 space-y-4 overflow-y-auto flex-1 custom-scrollbar"></div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut, GoogleAuthProvider, signInWithPopup, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
      apiKey: "AIzaSyCGemp_OA8savCmLZfX7Us0nmDpdbpv4N0",
      authDomain: "mytasks-saturday.firebaseapp.com",
      projectId: "mytasks-saturday",
      storageBucket: "mytasks-saturday.firebasestorage.app",
      messagingSenderId: "647554172397",
      appId: "1:647554172397:web:aac3ef00938ee7cd8f13e4"
    };

    const appId = typeof __app_id !== 'undefined' ? __app_id : 'saturday-v22';
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();
    
    let user = null;
    let currentView = 'list';

    // --- Authentication ---
    async function initAuth() {
      if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
        await signInWithCustomToken(auth, __initial_auth_token);
      }
    }

    onAuthStateChanged(auth, (u) => {
      user = u;
      const authView = document.getElementById('auth-view');
      const appView = document.getElementById('app-view');
      if (user) {
        authView.classList.add('hidden-view');
        appView.classList.remove('hidden-view');
        document.getElementById('user-email').innerText = user.email || 'Convidado';
        if (user.photoURL) document.getElementById('user-avatar').innerHTML = `<img src="${user.photoURL}" class="w-full h-full rounded-2xl object-cover" />`;
        else document.getElementById('user-avatar').innerText = (user.email || 'U').charAt(0).toUpperCase();
        loadTasks();
      } else {
        authView.classList.remove('hidden-view');
        appView.classList.add('hidden-view');
      }
      lucide.createIcons();
    });

    document.getElementById('auth-form').onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;
      try { await signInWithEmailAndPassword(auth, email, password); } 
      catch (err) { showToast("Falha no login: Credenciais inválidas.", "error"); }
    };

    document.getElementById('btn-google').onclick = () => signInWithPopup(auth, googleProvider);
    window.handleLogout = () => signOut(auth);

    // --- Drag & Drop ---
    window.allowDrop = (e) => {
      e.preventDefault();
      e.currentTarget.classList.add('drag-over');
    };
    window.dragLeave = (e) => e.currentTarget.classList.remove('drag-over');
    
    window.handleDragStart = (e, id) => {
      e.dataTransfer.setData('taskId', id);
      const element = document.getElementById(`card-${id}`);
      if(element) element.classList.add('dragging');
    };

    window.handleDragEnd = (id) => {
      const element = document.getElementById(`card-${id}`);
      if(element) element.classList.remove('dragging');
    };

    window.handleDrop = async (e, newStatus) => {
      e.preventDefault();
      const col = e.currentTarget;
      col.classList.remove('drag-over');
      const taskId = e.dataTransfer.getData('taskId');
      if (!taskId || !user) return;
      try {
        await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'tasks', taskId), { status: newStatus });
        showToast(`Movido para ${newStatus}`);
      } catch (err) { showToast("Erro ao atualizar status.", "error"); }
    };

    // --- Task Engine ---
    function getTaskPath() { return collection(db, 'artifacts', appId, 'users', user.uid, 'tasks'); }

    document.getElementById('task-form').onsubmit = async (e) => {
      e.preventDefault();
      if (!user) return;
      const fields = ['task-input', 'task-requester', 'task-deadline', 'task-urgency'];
      const data = {};
      fields.forEach(f => data[f.replace('task-', '')] = document.getElementById(f).value);
      
      try {
        await addDoc(getTaskPath(), {
          ...data,
          urgency: parseInt(data.urgency),
          status: "Pendente",
          createdAt: Date.now()
        });
        e.target.reset();
        showToast("Atividade lançada!");
      } catch (err) { showToast("Erro ao salvar tarefa.", "error"); }
    };

    function loadTasks() {
      if (!user) return;
      onSnapshot(query(getTaskPath()), (snap) => {
        const tasks = [];
        snap.forEach(d => tasks.push({ id: d.id, ...d.data() }));
        tasks.sort((a, b) => b.createdAt - a.createdAt);
        render(tasks);
      });
    }

    function render(tasks) {
      renderList(tasks);
      renderKanban(tasks);
      lucide.createIcons();
    }

    function renderList(tasks) {
      const container = document.getElementById('task-list-content');
      if (tasks.length === 0) {
        container.innerHTML = `<div class="p-20 text-center opacity-30 text-xs font-black uppercase tracking-[5px]">Sem registros</div>`;
        return;
      }
      container.innerHTML = tasks.map(t => {
        const zone = getUrgencyLabel(t.urgency);
        const overdue = isOverdue(t.deadline) && t.status !== 'Concluído';
        return `
          <div class="grid grid-cols-12 p-6 hover:bg-white/5 transition-all items-center">
            <div class="col-span-5 md:col-span-6 px-2">
              <p class="font-bold text-sm ${t.status === 'Concluído' ? 'line-through opacity-30' : ''}">${t.text}</p>
              <p class="text-[10px] font-bold opacity-30 mt-1 uppercase tracking-wider"><span class="text-red-500">Solicitante:</span> ${t.requester}</p>
            </div>
            <div class="col-span-2 px-2 text-center">
              <span class="text-[9px] font-black px-3 py-1 rounded-full border ${zone.cls} uppercase">${zone.label}</span>
            </div>
            <div class="col-span-2 px-2 text-center">
              <p class="text-[10px] font-black ${overdue ? 'text-red-500' : 'opacity-40'}">${formatDate(t.deadline)}</p>
            </div>
            <div class="col-span-2 px-2 text-center">
               <button onclick="window.cycleStatus('${t.id}', '${t.status}')" class="text-[9px] font-black px-3 py-1 rounded-full border border-white/10 ${getStatusStyle(t.status)} uppercase transition-all">
                 ${t.status}
               </button>
            </div>
            <div class="col-span-1 px-2 text-right">
              <button onclick="window.deleteTask('${t.id}')" class="text-gray-700 hover:text-red-500 transition-colors p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderKanban(tasks) {
      const statuses = ["Pendente", "Em Andamento", "Concluído"];
      statuses.forEach(status => {
        const col = document.getElementById(`kanban-${status.replace(' ', '')}`);
        const count = document.getElementById(`count-${status.replace(' ', '')}`);
        const filtered = tasks.filter(t => t.status === status);
        count.innerText = filtered.length;
        col.innerHTML = filtered.map(t => {
          const zone = getUrgencyLabel(t.urgency);
          const overdue = isOverdue(t.deadline) && t.status !== 'Concluído';
          return `
            <div id="card-${t.id}" draggable="true" ondragstart="handleDragStart(event, '${t.id}')" ondragend="handleDragEnd('${t.id}')" 
              class="glass-card p-5 space-y-4 draggable-card hover:border-red-600/30 transition-all group animate-fadeup shadow-2xl">
              <div class="flex justify-between items-start">
                 <span class="text-[8px] font-black uppercase tracking-widest px-2 py-0.5 rounded border ${zone.cls}">${zone.label}</span>
                 <button onclick="window.deleteTask('${t.id}')" class="opacity-0 group-hover:opacity-100 text-gray-700 hover:text-red-500 transition-all"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
              </div>
              <p class="text-xs font-bold leading-relaxed">${t.text}</p>
              <div class="pt-2 space-y-1">
                 <div class="flex items-center gap-2 text-[9px] font-bold opacity-40"><i data-lucide="user" class="w-3 h-3"></i> ${t.requester}</div>
                 <div class="flex items-center gap-2 text-[9px] font-black ${overdue ? 'text-red-500' : 'opacity-40'}"><i data-lucide="calendar" class="w-3 h-3"></i> PRAZO: ${formatDate(t.deadline)}</div>
              </div>
            </div>
          `;
        }).join('');
      });
    }

    // --- Helpers ---
    window.cycleStatus = async (id, current) => {
      const flow = ["Pendente", "Em Andamento", "Concluído"];
      let next = flow[(flow.indexOf(current) + 1) % flow.length];
      await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'tasks', id), { status: next });
    };

    window.deleteTask = async (id) => {
      if(confirm("Deseja realmente excluir esta atividade?")) {
        await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'tasks', id));
        showToast("Atividade removida.");
      }
    };

    window.changeView = (view) => {
      currentView = view;
      document.getElementById('list-view').className = view === 'list' ? 'animate-fadeup' : 'hidden-view';
      document.getElementById('kanban-view').className = view === 'kanban' ? 'h-full animate-fadeup' : 'hidden-view';
      
      const navL = document.querySelectorAll('.nav-item-list');
      const navK = document.querySelectorAll('.nav-item-kanban');
      const btnL = document.getElementById('toggle-list');
      const btnK = document.getElementById('toggle-kanban');

      const active = "bg-red-600/10 text-red-500";
      const inactive = "text-gray-500";

      if(view === 'list') {
        navL.forEach(n => n.className = n.className.replace(inactive, "").replace(active, "") + " " + active);
        navK.forEach(n => n.className = n.className.replace(inactive, "").replace(active, "") + " " + inactive);
        if(btnL) btnL.className = "p-2 px-6 rounded-xl bg-red-600 text-white text-[10px] font-black uppercase tracking-widest transition-all shadow-lg shadow-red-600/20";
        if(btnK) btnK.className = "p-2 px-6 rounded-xl text-gray-500 text-[10px] font-black uppercase tracking-widest transition-all hover:text-white";
      } else {
        navK.forEach(n => n.className = n.className.replace(inactive, "").replace(active, "") + " " + active);
        navL.forEach(n => n.className = n.className.replace(inactive, "").replace(active, "") + " " + inactive);
        if(btnK) btnK.className = "p-2 px-6 rounded-xl bg-red-600 text-white text-[10px] font-black uppercase tracking-widest transition-all shadow-lg shadow-red-600/20";
        if(btnL) btnL.className = "p-2 px-6 rounded-xl text-gray-500 text-[10px] font-black uppercase tracking-widest transition-all hover:text-white";
      }
      lucide.createIcons();
    };

    window.toggleMenu = (open) => {
      const menu = document.getElementById('mobile-menu');
      const overlay = document.getElementById('menu-overlay');
      if(open) { menu.classList.add('open'); overlay.classList.remove('hidden-view'); } 
      else { menu.classList.remove('open'); overlay.classList.add('hidden-view'); }
    };

    document.getElementById('open-menu').onclick = () => toggleMenu(true);
    document.getElementById('close-menu').onclick = () => toggleMenu(false);
    document.getElementById('menu-overlay').onclick = () => toggleMenu(false);

    function getStatusStyle(s) {
      if(s === 'Concluído') return 'text-emerald-500 bg-emerald-500/10 border-emerald-500/20';
      if(s === 'Em Andamento') return 'text-blue-500 bg-blue-500/10 border-blue-500/20';
      return 'text-gray-500 bg-white/5 border-white/5';
    }

    function getUrgencyLabel(lvl) {
      if(lvl === 3) return { label: 'CRÍTICO', cls: 'text-red-500 bg-red-500/10 border-red-500/30' };
      if(lvl === 2) return { label: 'IMPORTANTE', cls: 'text-yellow-500 bg-yellow-500/10 border-yellow-500/30' };
      return { label: 'NORMAL', cls: 'text-blue-500 bg-blue-500/10 border-blue-500/30' };
    }

    function formatDate(ds) {
      if(!ds) return '--/--/--';
      const [y, m, d] = ds.split('-');
      return `${d}/${m}/${y}`;
    }

    function isOverdue(ds) {
      if(!ds) return false;
      const t = new Date(); t.setHours(0,0,0,0);
      const d = new Date(ds); d.setHours(24,0,0,0);
      return d < t;
    }

    function showToast(msg, type='success') {
      const t = document.createElement('div');
      t.className = `p-5 mb-4 rounded-2xl glass-card border-l-4 ${type === 'error' ? 'border-red-500' : 'border-emerald-500'} animate-fadeup shadow-2xl min-w-[300px]`;
      t.innerHTML = `<p class="text-xs font-black uppercase tracking-widest text-white">${msg}</p>`;
      document.getElementById('toast-container').appendChild(t);
      setTimeout(() => t.remove(), 4000);
    }

    initAuth();
  </script>
</body>
</html>
