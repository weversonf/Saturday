<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saturday v18</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background-color: #09090b; color: #fafafa; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
    .glass-card { background: rgba(39, 39, 42, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; }
    .hidden-view { display: none !important; }
    .error-message { color: #ef4444; font-size: 0.875rem; margin-top: 0.5rem; text-align: center; font-weight: 500; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.5s ease-out forwards; }
  </style>
</head>
<body class="antialiased">

  <div id="auth-view" class="min-h-screen flex items-center justify-center relative overflow-hidden bg-[#09090b]">
    <div class="w-full max-w-md mx-4 glass-card p-8 relative z-10 fade-up">
      <div class="text-center mb-8">
        <div class="flex items-center justify-center gap-3 mb-4">
          <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-purple-500 to-blue-400 flex items-center justify-center shadow-lg shadow-purple-500/30">
            <span class="text-white font-bold text-lg">S</span>
          </div>
          <span class="text-2xl font-bold tracking-tight text-white">Saturday</span>
        </div>
        <h2 class="text-xl font-semibold text-white" id="auth-title">Entrar</h2>
      </div>

      <form id="auth-form" class="space-y-4">
        <input type="email" id="auth-email" placeholder="Email" required class="w-full p-3 rounded-xl bg-gray-800/50 border border-gray-700 text-white focus:outline-none focus:border-purple-500 transition-colors" />
        <input type="password" id="auth-password" placeholder="Senha" required minlength="6" class="w-full p-3 rounded-xl bg-gray-800/50 border border-gray-700 text-white focus:outline-none focus:border-purple-500 transition-colors" />
        <div id="auth-error" class="error-message"></div>
        <button type="submit" id="btn-submit" class="w-full p-3 rounded-xl bg-gradient-to-r from-purple-600 to-blue-500 hover:opacity-90 text-white font-medium shadow-lg transition-all">
          Entrar
        </button>
      </form>

      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-gray-700"></span></div>
        <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#09090b] px-2 text-gray-500">Ou continue com</span></div>
      </div>

      <button id="btn-google" type="button" class="w-full p-3 rounded-xl bg-gray-800 border border-gray-700 text-white hover:bg-gray-700 flex items-center justify-center gap-3 transition-colors mb-4">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
        </svg>
        Google
      </button>

      <button id="btn-toggle-auth" type="button" class="w-full text-sm text-gray-400 hover:text-purple-400 transition-colors">
        Não tem conta? Criar agora
      </button>
    </div>
  </div>

  <div id="app-view" class="hidden-view min-h-screen flex flex-col items-center justify-center bg-[#09090b] text-white">
    <div class="glass-card p-12 text-center fade-up">
        <h1 class="text-4xl font-bold mb-4">Bem-vindo ao Saturday!</h1>
        <p class="text-xl mb-8 text-gray-400">Logado como: <span id="user-display" class="text-purple-400 font-semibold"></span></p>
        <button id="btn-logout" class="px-8 py-3 bg-red-500/10 border border-red-500/50 text-red-500 rounded-xl font-bold hover:bg-red-500 hover:text-white transition-all">Sair do App</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { 
        getAuth, 
        signInWithEmailAndPassword, 
        createUserWithEmailAndPassword, 
        signOut, 
        onAuthStateChanged, 
        GoogleAuthProvider, 
        signInWithPopup 
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCGemp_OA8savCmLZfX7Us0nmDpdbpv4N0",
      authDomain: "mytasks-saturday.firebaseapp.com",
      projectId: "mytasks-saturday",
      storageBucket: "mytasks-saturday.firebasestorage.app",
      messagingSenderId: "647554172397",
      appId: "1:647554172397:web:aac3ef00938ee7cd8f13e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    
    // Melhora a UX do Google Auth: Força a seleção de conta
    provider.setCustomParameters({ prompt: 'select_account' });

    let isSignUpMode = false;

    // DOM Elements
    const authForm = document.getElementById('auth-form');
    const authTitle = document.getElementById('auth-title');
    const btnSubmit = document.getElementById('btn-submit');
    const btnToggle = document.getElementById('btn-toggle-auth');
    const btnGoogle = document.getElementById('btn-google');
    const btnLogout = document.getElementById('btn-logout');
    const authError = document.getElementById('auth-error');

    // Toggle Mode
    btnToggle.addEventListener('click', () => {
      isSignUpMode = !isSignUpMode;
      authTitle.innerText = isSignUpMode ? 'Criar Conta' : 'Entrar';
      btnSubmit.innerText = isSignUpMode ? 'Criar Conta' : 'Entrar';
      btnToggle.innerText = isSignUpMode ? 'Já tem conta? Entrar' : 'Não tem conta? Criar agora';
      authError.innerText = '';
    });

    // Email/Password Auth
    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;
      authError.innerText = 'Autenticando...';

      try {
        if (isSignUpMode) {
          await createUserWithEmailAndPassword(auth, email, password);
        } else {
          await signInWithEmailAndPassword(auth, email, password);
        }
      } catch (error) {
        handleAuthError(error);
      }
    });

    // Google Auth - Versão Robusta
    btnGoogle.addEventListener('click', async () => {
      authError.innerText = 'Iniciando Google Login...';
      try {
        const result = await signInWithPopup(auth, provider);
        console.log("Sucesso Google:", result.user);
      } catch (error) {
        console.error("Erro detalhado do Google:", error);
        handleAuthError(error);
      }
    });

    // Logout
    btnLogout.addEventListener('click', () => signOut(auth));

    // Auth Observer
    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('auth-view').classList.add('hidden-view');
        document.getElementById('app-view').classList.remove('hidden-view');
        document.getElementById('user-display').innerText = user.displayName || user.email;
        authError.innerText = '';
      } else {
        document.getElementById('auth-view').classList.remove('hidden-view');
        document.getElementById('app-view').classList.add('hidden-view');
      }
    });

    function handleAuthError(error) {
      let msg = "Erro na autenticação.";
      
      // Mapeamento de erros comuns
      switch (error.code) {
        case 'auth/operation-not-allowed':
          msg = "Erro: Ative o 'Google' no Console do Firebase!";
          break;
        case 'auth/popup-blocked':
          msg = "O navegador bloqueou o popup de login.";
          break;
        case 'auth/popup-closed-by-user':
          msg = "Login cancelado pelo usuário.";
          break;
        case 'auth/email-already-in-use':
          msg = "Este e-mail já está em uso.";
          break;
        case 'auth/wrong-password':
          msg = "Senha incorreta.";
          break;
        case 'auth/user-not-found':
          msg = "Usuário não encontrado.";
          break;
        default:
          msg = `Erro: ${error.message}`;
      }
      authError.innerText = msg;
    }
  </script>
</body>
</html>
