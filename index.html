<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saturday v02</title>

  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: '#09090b',
            foreground: '#fafafa',
            card: '#09090b',
            primary: '#8b5cf6', // Roxo principal
            secondary: '#27272a',
            border: '#27272a',
            muted: '#27272a',
            'muted-foreground': '#a1a1aa',
            destructive: '#ef4444',
          },
          fontFamily: {
            display: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background-color: theme('colors.background');
      color: theme('colors.foreground');
      font-family: 'Inter', sans-serif;
      margin: 0;
      overflow-x: hidden;
    }

    /* Efeito Glassmorphism dos cards */
    .glass-card {
      background: rgba(39, 39, 42, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 0.75rem;
    }

    /* Animação das esferas brilhantes no fundo do Login */
    @keyframes glow-pulse {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.1); }
    }
    .animate-glow-pulse {
      animation: glow-pulse 4s ease-in-out infinite;
    }

    /* Animações de entrada */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }
    .fade-up { animation: fadeUp 0.5s ease-out forwards; }
    .scale-in { animation: scaleIn 0.5s ease-out forwards; opacity: 0; }
    
    .delay-100 { animation-delay: 0.1s; }
    .delay-200 { animation-delay: 0.2s; }
    .delay-300 { animation-delay: 0.3s; }
    
    .hidden-view { display: none !important; }
  </style>
</head>
<body class="antialiased text-foreground bg-background">

  <div id="auth-view" class="min-h-screen flex items-center justify-center relative overflow-hidden bg-[#09090b]">
    <div class="absolute top-1/4 -left-32 w-64 h-64 rounded-full bg-primary/20 blur-[100px] animate-glow-pulse"></div>
    <div class="absolute bottom-1/4 -right-32 w-64 h-64 rounded-full bg-blue-500/15 blur-[100px] animate-glow-pulse" style="animation-delay: 1.5s;"></div>

    <div class="w-full max-w-md glass-card p-6 relative z-10 fade-up">
      <div class="text-center mb-6">
        <div class="flex items-center justify-center gap-3 mb-4">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-blue-400 flex items-center justify-center shadow-lg shadow-primary/30">
            <span class="text-white font-bold text-sm">AF</span>
          </div>
          <span class="text-xl font-display font-bold tracking-tight text-foreground">AdminFlow</span>
        </div>
        <h2 class="text-xl font-semibold text-foreground" id="auth-title">Entrar</h2>
      </div>

      <form id="auth-form" class="space-y-4">
        <input type="email" placeholder="Email" required class="w-full p-2.5 rounded-md bg-secondary/50 border border-border/50 text-white focus:outline-none focus:border-primary transition-colors" />
        <input type="password" placeholder="Senha" required minlength="6" class="w-full p-2.5 rounded-md bg-secondary/50 border border-border/50 text-white focus:outline-none focus:border-primary transition-colors" />
        <button type="submit" id="btn-submit" class="w-full p-2.5 rounded-md bg-gradient-to-r from-primary to-blue-500 hover:from-primary/90 hover:to-blue-500/90 text-white font-medium shadow-lg shadow-primary/20 transition-all">
          Entrar
        </button>
      </form>

      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center">
          <span class="w-full border-t border-border"></span>
        </div>
        <div class="relative flex justify-center text-xs uppercase">
          <span class="bg-card px-2 text-muted-foreground">Ou</span>
        </div>
      </div>

      <button id="btn-google" type="button" class="w-full p-2.5 rounded-md bg-secondary border border-border/50 text-foreground hover:bg-secondary/80 flex items-center justify-center gap-2 transition-colors mb-4">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
        </svg>
        Entrar com Google
      </button>

      <button id="btn-toggle-auth" class="w-full text-sm text-muted-foreground hover:text-primary transition-colors">
        Não tem conta? Criar agora
      </button>
    </div>
  </div>

  <div id="app-view" class="hidden-view min-h-screen flex flex-col md:flex-row bg-[#09090b]">
    
    <aside class="w-full md:w-64 border-r border-border bg-card p-4 flex flex-col gap-4">
      <div class="flex items-center gap-3 px-2 py-4">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-blue-400 flex items-center justify-center">
          <span class="text-white font-bold text-xs">AF</span>
        </div>
        <span class="font-bold text-foreground">AdminFlow</span>
      </div>
      <nav class="space-y-1">
        <button onclick="navigate('dashboard')" class="w-full flex items-center gap-3 px-3 py-2 rounded-md bg-primary/10 text-primary transition-colors">
          <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
        </button>
        <button onclick="navigate('tasks')" class="w-full flex items-center gap-3 px-3 py-2 rounded-md hover:bg-secondary text-muted-foreground transition-colors">
          <i data-lucide="list-todo" class="w-4 h-4"></i> Minhas Tarefas
        </button>
        <button onclick="logout()" class="w-full flex items-center gap-3 px-3 py-2 rounded-md hover:bg-secondary text-destructive mt-8 transition-colors">
          <i data-lucide="log-out" class="w-4 h-4"></i> Sair
        </button>
      </nav>
    </aside>

    <main class="flex-1 p-6 overflow-y-auto h-screen">
      
      <div id="dashboard-content" class="space-y-6 fade-up">
        <div class="flex items-center justify-between">
          <div>
            <h1 class="text-2xl font-display font-bold text-foreground">Dashboard</h1>
            <p class="text-sm text-muted-foreground mt-1" id="user-greeting">Visão geral das suas tarefas</p>
          </div>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4" id="kpi-container">
          </div>

        <div class="grid lg:grid-cols-3 gap-6">
          <div class="glass-card p-4 lg:col-span-1 h-full scale-in delay-100">
            <h3 class="text-sm font-medium flex items-center gap-2 mb-4 text-foreground">
              <i data-lucide="trending-up" class="w-4 h-4 text-primary"></i> Tarefas por Status
            </h3>
            <div class="relative h-48 w-full flex justify-center">
              <canvas id="statusChart"></canvas>
            </div>
          </div>

          <div class="glass-card p-4 lg:col-span-1 h-full scale-in delay-200">
            <h3 class="text-sm font-medium flex items-center gap-2 mb-4 text-foreground">
              <i data-lucide="folder-kanban" class="w-4 h-4 text-primary"></i> Projetos
            </h3>
            <div id="projects-container" class="space-y-3">
              </div>
          </div>

          <div class="glass-card p-4 lg:col-span-1 h-full scale-in delay-300">
            <h3 class="text-sm font-medium mb-4 text-foreground">Atualizações Recentes</h3>
            <div id="recent-container" class="space-y-2">
              </div>
          </div>
        </div>
      </div>

      <div id="tasks-content" class="hidden-view space-y-6 fade-up">
        <h1 class="text-2xl font-display font-bold text-foreground">Minhas Tarefas</h1>
        <div class="glass-card p-8 text-center text-muted-foreground">
          <i data-lucide="wrench" class="w-8 h-8 mx-auto mb-2 opacity-50"></i>
          <p>Módulo de tarefas está em construção.</p>
        </div>
      </div>

    </main>
  </div>

  <script type="module">
    // 1. Importações do Firebase (Adicionado GoogleAuthProvider e signInWithPopup)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    // 2. Configuração
    const firebaseConfig = {
      apiKey: "AIzaSyCGemp_OA8savCmLZfX7Us0nmDpdbpv4N0",
      authDomain: "mytasks-saturday.firebaseapp.com",
      projectId: "mytasks-saturday",
      storageBucket: "mytasks-saturday.firebasestorage.app",
      messagingSenderId: "647554172397",
      appId: "1:647554172397:web:aac3ef00938ee7cd8f13e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    // Provedor do Google
    const googleProvider = new GoogleAuthProvider();

    // Inicializa ícones
    lucide.createIcons();

    // 3. Variáveis da Interface
    let isLoginMode = true;
    const authForm = document.getElementById('auth-form');
    const authTitle = document.getElementById('auth-title');
    const btnSubmit = document.getElementById('btn-submit');
    const btnToggleAuth = document.getElementById('btn-toggle-auth');
    const btnGoogle = document.getElementById('btn-google');
    const emailInput = document.querySelector('input[type="email"]');
    const passwordInput = document.querySelector('input[type="password"]');

    // 4. Alternar entre Login e Cadastro
    btnToggleAuth.addEventListener('click', () => {
      isLoginMode = !isLoginMode;
      authTitle.innerText = isLoginMode ? "Entrar" : "Criar conta";
      btnSubmit.innerText = isLoginMode ? "Entrar" : "Criar conta";
      btnToggleAuth.innerText = isLoginMode ? "Não tem conta? Criar agora" : "Já tem conta? Entrar";
    });

    // 5. Envio do Formulário (E-mail e Senha)
    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value;
      const password = passwordInput.value;
      btnSubmit.innerText = "Carregando...";

      try {
        if (isLoginMode) {
          await signInWithEmailAndPassword(auth, email, password);
        } else {
          await createUserWithEmailAndPassword(auth, email, password);
          alert("Conta criada! O login será feito automaticamente.");
        }
      } catch (error) {
        let msg = error.message;
        if (error.code === 'auth/invalid-credential') msg = "E-mail ou senha incorretos.";
        if (error.code === 'auth/email-already-in-use') msg = "Este e-mail já está cadastrado.";
        alert(msg);
        btnSubmit.innerText = isLoginMode ? "Entrar" : "Criar conta";
      }
    });

    // 6. Login com Google
    btnGoogle.addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, googleProvider);
      } catch (error) {
        alert("Erro ao entrar com Google: " + error.message);
      }
    });

    // 7. Observador de Sessão (Controla o acesso às telas)
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // Usuário logado: mostra o app
        document.getElementById('auth-view').classList.add('hidden-view');
        document.getElementById('app-view').classList.remove('hidden-view');
        
        // Usa o displayName (nome do Google) se existir, senão usa o e-mail
        const userName = user.displayName || user.email;
        document.getElementById('user-greeting').innerText = `Logado como: ${userName}`;
        renderDashboard();
      } else {
        // Sem usuário: mostra a tela de login
        document.getElementById('app-view').classList.add('hidden-view');
        document.getElementById('auth-view').classList.remove('hidden-view');
        btnSubmit.innerText = "Entrar";
        authForm.reset();
      }
    });

    // 8. Funções Globais (Exportadas para uso nos onclicks do HTML)
    window.logout = async () => {
      await signOut(auth);
    };

    window.navigate = (viewName) => {
      document.getElementById('dashboard-content').classList.add('hidden-view');
      document.getElementById('tasks-content').classList.add('hidden-view');
      document.getElementById(`${viewName}-content`).classList.remove('hidden-view');
    };

    // 9. Lógica do Dashboard (Ainda com dados visuais de teste)
    const STATUS_COLORS = {
      "Pronto": "#00C875",
      "Trabalhando nisso": "#9b6dff",
      "Travado": "#E2445C",
      "Não iniciado": "#5a5a7a",
    };
    let statusChartInstance = null;

    function renderDashboard() {
      // Estes dados ainda são MOCKS. O Firestore será integrado na próxima fase.
      const mockTasks = [
        { id: 1, title: "Ajustar layout da Landing Page", status: "Pronto", updated_at: "2026-03-19T10:00:00Z", project_id: 101 },
        { id: 2, title: "Integrar API de pagamento", status: "Trabalhando nisso", updated_at: "2026-03-18T15:30:00Z", project_id: 101 },
        { id: 3, title: "Corrigir bug no login", status: "Travado", updated_at: "2026-03-17T09:00:00Z", project_id: 102 },
        { id: 4, title: "Escrever documentação", status: "Não iniciado", updated_at: "2026-03-16T14:00:00Z", project_id: 102 },
        { id: 5, title: "Reunião de alinhamento", status: "Pronto", updated_at: "2026-03-15T11:00:00Z", project_id: 103 },
      ];

      const mockProjects = [
        { id: 101, name: "SaaS Financeiro" },
        { id: 102, name: "App Mobile" },
        { id: 103, name: "Marketing" }
      ];

      const total = mockTasks.length;
      const done = mockTasks.filter(t => t.status === "Pronto").length;
      const working = mockTasks.filter(t => t.status === "Trabalhando nisso").length;

      const kpisHtml = `
        ${createKpiCard('list-todo', 'Total de Tarefas', total, 'text-primary', 'from-primary/20 to-primary/5')}
        ${createKpiCard('check-circle-2', 'Concluídas', done, 'text-emerald-400', 'from-emerald-500/20 to-emerald-500/5')}
        ${createKpiCard('clock', 'Em Progresso', working, 'text-primary', 'from-primary/20 to-blue-500/5')}
        ${createKpiCard('alert-triangle', 'Atrasadas', 0, 'text-destructive', 'from-destructive/20 to-destructive/5')}
      `;
      document.getElementById('kpi-container').innerHTML = kpisHtml;

      const projectsHtml = mockProjects.map(p => {
        const pTasks = mockTasks.filter(t => t.project_id === p.id);
        const pDone = pTasks.filter(t => t.status === "Pronto").length;
        const pct = pTasks.length ? Math.round((pDone / pTasks.length) * 100) : 0;
        return `
          <div class="p-3 rounded-xl bg-secondary/50 hover:bg-secondary transition-colors">
            <div class="flex items-center justify-between mb-2">
              <p class="text-sm font-medium truncate text-foreground">${p.name}</p>
              <span class="text-xs text-muted-foreground ml-2 shrink-0">${pct}%</span>
            </div>
            <div class="w-full bg-background rounded-full h-1.5 mb-1 overflow-hidden">
              <div class="bg-primary h-1.5 rounded-full" style="width: ${pct}%"></div>
            </div>
            <p class="text-[10px] text-muted-foreground">${pTasks.length} tarefas</p>
          </div>
        `;
      }).join('');
      document.getElementById('projects-container').innerHTML = projectsHtml;

      const recentHtml = mockTasks.slice(0, 5).map(t => {
        const color = STATUS_COLORS[t.status];
        return `
          <div class="flex items-center gap-3 p-2 rounded-lg hover:bg-secondary/50 transition-colors">
            <div class="w-2 h-2 rounded-full shrink-0" style="background-color: ${color}"></div>
            <div class="flex-1 min-w-0">
              <p class="text-xs font-medium truncate text-foreground">${t.title}</p>
              <p class="text-[10px] text-muted-foreground">${t.status}</p>
            </div>
          </div>
        `;
      }).join('');
      document.getElementById('recent-container').innerHTML = recentHtml;

      lucide.createIcons();
      renderChart(mockTasks);
    }

    function createKpiCard(icon, label, value, iconColor, gradient) {
      return `
        <div class="glass-card overflow-hidden relative p-4 flex items-center gap-4 transition-transform hover:scale-105">
          <div class="absolute inset-0 bg-gradient-to-br ${gradient} pointer-events-none opacity-50"></div>
          <div class="${iconColor} relative z-10 p-2 rounded-xl bg-background/30">
            <i data-lucide="${icon}" class="w-5 h-5"></i>
          </div>
          <div class="relative z-10">
            <p class="text-2xl font-display font-bold text-foreground">${value}</p>
            <p class="text-[11px] text-muted-foreground">${label}</p>
          </div>
        </div>
      `;
    }

    function renderChart(tasks) {
      const ctx = document.getElementById('statusChart').getContext('2d');
      const counts = {
        "Pronto": tasks.filter(t => t.status === "Pronto").length,
        "Trabalhando nisso": tasks.filter(t => t.status === "Trabalhando nisso").length,
        "Travado": tasks.filter(t => t.status === "Travado").length,
        "Não iniciado": tasks.filter(t => t.status === "Não iniciado").length,
      };

      if (statusChartInstance) statusChartInstance.destroy();

      statusChartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: Object.keys(counts),
          datasets: [{ data: Object.values(counts), backgroundColor: Object.keys(counts).map(k => STATUS_COLORS[k]), borderWidth: 0 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, cutout: '70%',
          plugins: { legend: { display: false } }
        }
      });
    }
  </script>
</body>
</html>
