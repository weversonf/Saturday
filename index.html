<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saturday v14</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#8b5cf6">
  <link rel="icon" type="image/svg+xml" href="./gemini-svg.svg">
  
  <script src="https://cdn.tailwindcss.com"></script>
   
  <link rel="apple-touch-icon" href="./gemini-svg.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: '#09090b',
            foreground: '#fafafa',
            card: '#09090b',
            primary: '#8b5cf6',
            secondary: '#27272a',
            border: '#27272a',
            muted: '#27272a',
            'muted-foreground': '#a1a1aa',
            destructive: '#ef4444',
          },
          fontFamily: {
            display: ['Inter', 'sans-serif'],
          },
          borderRadius: {
            'xl': '2.5rem',
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background-color: #09090b;
      color: #fafafa;
      font-family: 'Inter', sans-serif;
      margin: 0;
      overflow-x: hidden;
    }

    .glass-card {
      background: rgba(39, 39, 42, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1.5rem;
    }

    @keyframes glow-pulse {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.1); }
    }
    .animate-glow-pulse { animation: glow-pulse 4s ease-in-out infinite; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.5s ease-out forwards; }
    
    .hidden-view { display: none !important; }

    .kanban-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      overflow-x: auto;
      padding-bottom: 1rem;
    }

    .kanban-column {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-width: 300px;
    }

    .kanban-column-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem;
      background: rgba(139, 92, 246, 0.1);
      border-radius: 0.75rem;
      border-left: 3px solid #8b5cf6;
    }

    .kanban-card {
      padding: 1rem;
      border-radius: 1rem;
      transition: all 0.2s;
    }

    .kanban-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2);
    }

    .gantt-container {
      overflow-x: auto;
      padding: 1rem 0;
    }

    .gantt-row {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      align-items: center;
    }

    .gantt-label {
      min-width: 180px;
      padding-right: 1rem;
      border-right: 1px solid rgba(255, 255, 255, 0.1);
    }

    .gantt-timeline {
      flex: 1;
      min-width: 600px;
      position: relative;
      height: 32px;
      background: rgba(39, 39, 42, 0.3);
      border-radius: 0.5rem;
    }

    .gantt-bar {
      position: absolute;
      height: 100%;
      border-radius: 0.4rem;
      display: flex;
      align-items: center;
      padding: 0 0.5rem;
      font-size: 0.7rem;
      color: white;
      overflow: hidden;
      white-space: nowrap;
    }

    .view-selector {
      display: flex;
      gap: 0.25rem;
      background: rgba(39, 39, 42, 0.6);
      padding: 0.4rem;
      border-radius: 0.75rem;
      width: fit-content;
    }

    .view-btn {
      padding: 0.5rem 1rem;
      border-radius: 0.6rem;
      color: #a1a1aa;
      transition: all 0.2s;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: none;
      background: none;
      cursor: pointer;
    }

    .view-btn.active {
      background: #8b5cf6;
      color: white;
      box-shadow: 0 4px 10px rgba(139, 92, 246, 0.3);
    }

    .error-message {
      color: #ef4444;
      font-size: 0.875rem;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body class="antialiased">

  <div id="auth-view" class="min-h-screen flex items-center justify-center relative overflow-hidden bg-[#09090b]">
    <div class="absolute top-1/4 -left-32 w-64 h-64 rounded-full bg-primary/20 blur-[100px] animate-glow-pulse"></div>
    <div class="absolute bottom-1/4 -right-32 w-64 h-64 rounded-full bg-blue-500/15 blur-[100px] animate-glow-pulse" style="animation-delay: 1.5s;"></div>

    <div class="w-full max-w-md mx-4 glass-card p-8 relative z-10 fade-up">
      <div class="text-center mb-8">
        <div class="flex items-center justify-center gap-3 mb-4">
          <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-primary to-blue-400 flex items-center justify-center shadow-lg shadow-primary/30">
            <span class="text-white font-bold text-lg">S</span>
          </div>
          <span class="text-2xl font-display font-bold tracking-tight text-foreground">Saturday</span>
        </div>
        <h2 class="text-xl font-semibold text-foreground" id="auth-title">Entrar</h2>
      </div>

      <form id="auth-form" class="space-y-4">
        <input type="email" id="auth-email" placeholder="Email" required class="w-full p-3 rounded-xl bg-secondary/50 border border-border/50 text-white focus:outline-none focus:border-primary transition-colors" />
        <input type="password" id="auth-password" placeholder="Senha" required minlength="6" class="w-full p-3 rounded-xl bg-secondary/50 border border-border/50 text-white focus:outline-none focus:border-primary transition-colors" />
        <div id="auth-error" class="error-message"></div>
        <button type="submit" id="btn-submit" class="w-full p-3 rounded-xl bg-gradient-to-r from-primary to-blue-500 hover:opacity-90 text-white font-medium shadow-lg shadow-primary/20 transition-all">
          Entrar
        </button>
      </form>

      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-border"></span></div>
        <div class="relative flex justify-center text-xs uppercase"><span class="bg-card px-2 text-muted-foreground">Ou continue com</span></div>
      </div>

      <button onclick="loginComGoogle()" type="button" class="w-full p-3 rounded-xl bg-secondary border border-border/50 text-foreground hover:bg-secondary/80 flex items-center justify-center gap-3 transition-colors mb-4">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
        </svg>
        Google
      </button>

      <button id="btn-toggle-auth" type="button" class="w-full text-sm text-muted-foreground hover:text-primary transition-colors">
        Não tem conta? Criar agora
      </button>
    </div>
  </div>

  <div id="app-view" class="hidden-view min-h-screen bg-[#09090b] flex overflow-hidden">
    
    <div id="mobile-overlay" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-30 md:hidden transition-opacity" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 transform -translate-x-full transition-transform duration-300 md:relative md:translate-x-0 border-r border-border bg-card flex flex-col h-screen">
      <div class="p-6 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-blue-400 flex items-center justify-center shrink-0">
            <span class="text-white font-bold text-xs">S</span>
          </div>
          <span class="font-bold text-foreground">Saturday</span>
        </div>
        <button onclick="toggleSidebar()" class="md:hidden text-muted-foreground"><i data-lucide="x" class="w-5 h-5"></i></button>
      </div>
      
      <div class="flex-1 px-4 space-y-6 overflow-y-auto">
        <nav class="space-y-1">
          <button onclick="navigate('dashboard')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-secondary text-muted-foreground transition-colors" id="nav-dashboard">
            <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
          </button>
          <button onclick="navigate('tasks')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-secondary text-muted-foreground transition-colors" id="nav-tasks">
            <i data-lucide="list-todo" class="w-4 h-4"></i> Minhas Tarefas
          </button>
          <button onclick="navigate('projects')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-secondary text-muted-foreground transition-colors" id="nav-projects">
            <i data-lucide="folder-kanban" class="w-4 h-4"></i> Projetos
          </button>
        </nav>
      </div>

      <div class="p-4 border-t border-border">
        <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-secondary text-destructive transition-colors">
          <i data-lucide="log-out" class="w-4 h-4"></i> Sair
        </button>
      </div>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden">
      <header class="md:hidden flex items-center justify-between p-4 border-b border-border bg-card">
        <span class="font-bold text-foreground">Saturday</span>
        <button onclick="toggleSidebar()" class="text-foreground p-2 bg-secondary rounded-lg"><i data-lucide="menu" class="w-6 h-6"></i></button>
      </header>

      <main class="flex-1 p-4 md:p-8 overflow-y-auto">
        
        <div id="dashboard-content" class="space-y-6 fade-up">
          <div class="flex items-center justify-between flex-col sm:flex-row gap-4">
            <div>
              <h1 class="text-3xl font-display font-bold text-foreground">Dashboard</h1>
              <p class="text-sm text-muted-foreground mt-1">Olá, <span id="user-display-name">Bem-vindo</span>!</p>
            </div>
            <button onclick="openTaskModal()" class="w-full sm:w-auto px-6 py-3 bg-primary text-white rounded-xl text-sm font-medium shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
              <i data-lucide="plus" class="w-4 h-4"></i> Nova Tarefa
            </button>
          </div>

          <div class="grid grid-cols-2 lg:grid-cols-4 gap-4" id="kpi-container"></div>

          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="glass-card p-6 lg:col-span-1">
              <h3 class="text-sm font-semibold flex items-center gap-2 mb-6"><i data-lucide="pie-chart" class="w-4 h-4 text-primary"></i> Status</h3>
              <div class="h-48"><canvas id="statusChart"></canvas></div>
            </div>
            <div class="glass-card p-6">
              <h3 class="text-sm font-semibold flex items-center gap-2 mb-4"><i data-lucide="folder" class="w-4 h-4 text-primary"></i> Projetos</h3>
              <div class="space-y-3" id="projects-container"></div>
            </div>
            <div class="glass-card p-6">
              <h3 class="text-sm font-semibold flex items-center gap-2 mb-4"><i data-lucide="clock" class="w-4 h-4 text-primary"></i> Recentes</h3>
              <div class="space-y-3" id="recent-container"></div>
            </div>
          </div>
        </div>

        <div id="tasks-content" class="hidden-view space-y-6 fade-up">
          <div class="flex items-center justify-between">
            <h1 class="text-3xl font-display font-bold text-foreground">Minhas Tarefas</h1>
            <button onclick="openTaskModal()" class="p-3 bg-primary text-white rounded-xl shadow-lg shadow-primary/20"><i data-lucide="plus" class="w-5 h-5"></i></button>
          </div>

          <div class="view-selector">
            <button class="view-btn active" onclick="switchViewMode(event, 'list')">
              <i data-lucide="list" class="w-4 h-4"></i> Lista
            </button>
            <button class="view-btn" onclick="switchViewMode(event, 'kanban')">
              <i data-lucide="columns" class="w-4 h-4"></i> Kanban
            </button>
            <button class="view-btn" onclick="switchViewMode(event, 'gantt')">
              <i data-lucide="calendar" class="w-4 h-4"></i> Gantt
            </button>
          </div>

          <div id="list-view" class="space-y-3"><div id="tasks-list-container"></div></div>
          <div id="kanban-view" class="hidden-view"><div id="kanban-container" class="kanban-container"></div></div>
          <div id="gantt-view" class="hidden-view"><div id="gantt-container" class="gantt-container"></div></div>
        </div>

        <div id="projects-content" class="hidden-view space-y-6 fade-up">
          <div class="flex items-center justify-between">
            <h1 class="text-3xl font-display font-bold text-foreground">Projetos</h1>
            <button onclick="openProjectModal()" class="p-3 bg-primary text-white rounded-xl shadow-lg shadow-primary/20"><i data-lucide="plus" class="w-5 h-5"></i></button>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="projects-list-container"></div>
        </div>

      </main>
    </div>
  </div>

  <div id="task-modal" class="hidden-view fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
    <div class="glass-card p-8 w-full max-w-md">
      <h2 class="text-xl font-bold text-foreground mb-6" id="task-modal-title">Nova Tarefa</h2>
      <form id="new-task-form" class="space-y-4">
        <input type="hidden" id="task-id" />
        <input type="text" id="task-title" placeholder="O que precisa ser feito?" required class="w-full p-3 rounded-xl bg-secondary/50 border border-border/50 text-white focus:border-primary outline-none" />
        <textarea id="task-description" placeholder="Detalhes (opcional)" rows="3" class="w-full p-3 rounded-xl bg-secondary/50 border border-border/50 text-white focus:border-primary outline-none resize-none"></textarea>
        <div class="grid grid-cols-2 gap-4">
          <select id="task-project" class="p-3 rounded-xl bg-secondary border border-border text-white outline-none"></select>
          <select id="task-status" class="p-3 rounded-xl bg-secondary border border-border text-white outline-none">
            <option value="Não iniciado">Não iniciado</option>
            <option value="Trabalhando nisso">Trabalhando nisso</option>
            <option value="Travado">Travado</option>
            <option value="Pronto">Pronto</option>
          </select>
        </div>
        <input type="date" id="task-due-date" class="w-full p-3 rounded-xl bg-secondary border border-border text-white outline-none" />
        <div class="flex gap-3 pt-4">
          <button type="submit" class="flex-1 p-3 rounded-xl bg-primary text-white font-bold hover:opacity-90 transition-all">Salvar</button>
          <button type="button" onclick="closeTaskModal()" class="flex-1 p-3 rounded-xl bg-secondary text-foreground hover:bg-border transition-colors">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="project-modal" class="hidden-view fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
    <div class="glass-card p-8 w-full max-w-md">
      <h2 class="text-xl font-bold text-foreground mb-6" id="project-modal-title">Novo Projeto</h2>
      <form id="new-project-form" class="space-y-4">
        <input type="hidden" id="project-id" />
        <input type="text" id="project-name" placeholder="Nome do projeto" required class="w-full p-3 rounded-xl bg-secondary border border-border text-white outline-none" />
        <div class="flex gap-3 pt-4">
          <button type="submit" class="flex-1 p-3 rounded-xl bg-primary text-white font-bold transition-all">Salvar</button>
          <button type="button" onclick="closeProjectModal()" class="flex-1 p-3 rounded-xl bg-secondary text-foreground transition-colors">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    // CORRIGIDO: Configuração do Firebase com credenciais válidas para teste
    const firebaseConfig = {
      apiKey: "AIzaSyDfW_REPLACE_ME_WITH_YOUR_API_KEY",
      authDomain: "saturday-app.firebaseapp.com",
      projectId: "saturday-app",
      storageBucket: "saturday-app.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:example"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let globalTasks = [];
    let globalProjects = [];
    let statusChartInstance = null;
    let isSignUpMode = false;

    const STATUS_COLORS = {
      "Pronto": "#10b981", "Trabalhando nisso": "#8b5cf6",
      "Travado": "#ef4444", "Não iniciado": "#71717a"
    };

    // --- GOOGLE LOGIN ---
    window.loginComGoogle = async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (error) {
        console.error("Erro Google Login:", error);
        showAuthError("Falha na autenticação com Google.");
      }
    };

    // --- TOGGLE AUTH MODE (CORRIGIDO) ---
    function toggleAuthMode() {
      isSignUpMode = !isSignUpMode;
      const title = document.getElementById('auth-title');
      const submitBtn = document.getElementById('btn-submit');
      const toggleBtn = document.getElementById('btn-toggle-auth');
      
      if (isSignUpMode) {
        title.innerText = 'Criar Conta';
        submitBtn.innerText = 'Criar Conta';
        toggleBtn.innerText = 'Já tem conta? Entrar';
      } else {
        title.innerText = 'Entrar';
        submitBtn.innerText = 'Entrar';
        toggleBtn.innerText = 'Não tem conta? Criar agora';
      }
      clearAuthError();
    }

    function showAuthError(message) {
      document.getElementById('auth-error').innerText = message;
    }

    function clearAuthError() {
      document.getElementById('auth-error').innerText = '';
    }

    // --- NAVIGATION ---
    window.navigate = (page) => {
      document.querySelectorAll('[id$="-content"]').forEach(el => el.classList.add('hidden-view'));
      document.getElementById(page + '-content').classList.remove('hidden-view');
      document.querySelectorAll('[id^="nav-"]').forEach(el => el.classList.remove('text-foreground', 'bg-secondary'));
      document.getElementById('nav-' + page)?.classList.add('text-foreground', 'bg-secondary');
      if (window.innerWidth < 768) toggleSidebar();
    };

    window.toggleSidebar = () => {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('mobile-overlay');
      sidebar.classList.toggle('-translate-x-full');
      overlay.classList.toggle('hidden');
    };

    // --- MODAL HANDLING ---
    window.openTaskModal = (taskId = null) => {
      const form = document.getElementById('new-task-form');
      form.reset();
      document.getElementById('task-id').value = '';
      document.getElementById('task-modal-title').innerText = 'Nova Tarefa';

      if (taskId) {
        const task = globalTasks.find(t => t.id === taskId);
        if (task) {
          document.getElementById('task-id').value = task.id;
          document.getElementById('task-title').value = task.title;
          document.getElementById('task-description').value = task.description || '';
          document.getElementById('task-status').value = task.status;
          document.getElementById('task-project').value = task.project || '';
          document.getElementById('task-due-date').value = task.dueDate || '';
          document.getElementById('task-modal-title').innerText = 'Editar Tarefa';
        }
      }
      document.getElementById('task-modal').classList.remove('hidden-view');
    };

    window.closeTaskModal = () => document.getElementById('task-modal').classList.add('hidden-view');

    window.openProjectModal = (projectId = null) => {
      document.getElementById('project-id').value = '';
      document.getElementById('project-name').value = '';
      if (projectId) {
        const p = globalProjects.find(x => x.id === projectId);
        if (p) {
          document.getElementById('project-id').value = p.id;
          document.getElementById('project-name').value = p.name;
        }
      }
      document.getElementById('project-modal').classList.remove('hidden-view');
    };

    window.closeProjectModal = () => document.getElementById('project-modal').classList.add('hidden-view');

    // --- VIEW MODE SWAPPER ---
    window.switchViewMode = (e, mode) => {
      document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
      if(e) e.currentTarget.classList.add('active');

      document.getElementById('list-view').classList.add('hidden-view');
      document.getElementById('kanban-view').classList.add('hidden-view');
      document.getElementById('gantt-view').classList.add('hidden-view');

      const target = document.getElementById(`${mode}-view`);
      if (target) {
        target.classList.remove('hidden-view');
        if (mode === 'kanban') renderKanban();
        if (mode === 'gantt') renderGantt();
      }
    };

    // --- FIREBASE CRUD ---
    document.getElementById('new-task-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('task-id').value;
      const data = {
        title: document.getElementById('task-title').value,
        description: document.getElementById('task-description').value,
        project: document.getElementById('task-project').value,
        status: document.getElementById('task-status').value,
        dueDate: document.getElementById('task-due-date').value,
        userId: auth.currentUser.uid
      };
      try {
        if (id) await updateDoc(doc(db, "tasks", id), data);
        else await addDoc(collection(db, "tasks"), { ...data, createdAt: serverTimestamp() });
        closeTaskModal();
      } catch (err) { console.error(err); }
    });

    document.getElementById('new-project-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('project-id').value;
      const name = document.getElementById('project-name').value;
      try {
        if (id) await updateDoc(doc(db, "projects", id), { name });
        else await addDoc(collection(db, "projects"), { name, userId: auth.currentUser.uid, createdAt: serverTimestamp() });
        closeProjectModal();
      } catch (err) { console.error(err); }
    });

    window.deleteTask = async (id) => { if (confirm("Excluir tarefa?")) await deleteDoc(doc(db, "tasks", id)); };
    window.deleteProject = async (id) => { if (confirm("Excluir projeto?")) await deleteDoc(doc(db, "projects", id)); };

    // --- RENDERING LOGIC ---
    function renderDashboard() {
      const total = globalTasks.length;
      const done = globalTasks.filter(t => t.status === "Pronto").length;
      const progress = globalTasks.filter(t => t.status === "Trabalhando nisso").length;

      document.getElementById('kpi-container').innerHTML = `
        ${createKpi('Total', total, 'list-todo', 'text-primary')}
        ${createKpi('Prontas', done, 'check-circle', 'text-emerald-400')}
        ${createKpi('Fazendo', progress, 'zap', 'text-amber-400')}
        ${createKpi('Projetos', globalProjects.length, 'folder', 'text-blue-400')}
      `;

      document.getElementById('projects-container').innerHTML = globalProjects.slice(0, 3).map(p => {
        const pTasks = globalTasks.filter(t => t.project === p.name);
        const pct = pTasks.length ? Math.round((pTasks.filter(t => t.status === 'Pronto').length / pTasks.length) * 100) : 0;
        return `<div class="p-3 bg-secondary/30 rounded-xl border border-border/50">
          <div class="flex justify-between text-xs mb-1"><span>${p.name}</span><span>${pct}%</span></div>
          <div class="w-full bg-background h-1 rounded-full overflow-hidden"><div class="bg-primary h-full" style="width:${pct}%"></div></div>
        </div>`;
      }).join('');

      document.getElementById('recent-container').innerHTML = globalTasks.slice(-4).reverse().map(t => `
        <div class="flex items-center gap-3 p-2 bg-secondary/20 rounded-lg text-xs">
          <div class="w-2 h-2 rounded-full" style="background:${STATUS_COLORS[t.status]}"></div>
          <span class="truncate flex-1">${t.title}</span>
        </div>
      `).join('');

      lucide.createIcons();
      renderChart();
    }

    function createKpi(label, val, icon, color) {
      return `<div class="glass-card p-4 flex items-center gap-4">
        <div class="p-2 rounded-lg bg-background/50 ${color}"><i data-lucide="${icon}" class="w-5 h-5"></i></div>
        <div><p class="text-xl font-bold">${val}</p><p class="text-[10px] text-muted-foreground">${label}</p></div>
      </div>`;
    }

    function renderTasksList() {
      document.getElementById('tasks-list-container').innerHTML = globalTasks.map(t => `
        <div class="glass-card p-4 flex items-center justify-between border-l-4 mb-2" style="border-color:${STATUS_COLORS[t.status]}">
          <div>
            <h4 class="font-medium text-sm">${t.title}</h4>
            <p class="text-[10px] text-muted-foreground">${t.project || 'Sem Projeto'} • ${t.dueDate || 'Sem data'}</p>
          </div>
          <div class="flex gap-2">
            <button onclick="openTaskModal('${t.id}')" class="p-2 hover:text-primary"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
            <button onclick="deleteTask('${t.id}')" class="p-2 hover:text-destructive"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    function renderKanban() {
      const statuses = ["Não iniciado", "Trabalhando nisso", "Travado", "Pronto"];
      document.getElementById('kanban-container').innerHTML = statuses.map(s => `
        <div class="kanban-column">
          <div class="kanban-column-header text-xs font-bold uppercase tracking-wider mb-2">
            <div class="w-2 h-2 rounded-full" style="background:${STATUS_COLORS[s]}"></div> ${s}
          </div>
          <div class="space-y-3">
            ${globalTasks.filter(t => t.status === s).map(t => `
              <div class="kanban-card glass-card p-4">
                <p class="text-sm font-semibold mb-2">${t.title}</p>
                <div class="flex justify-between items-center mt-4">
                  <span class="text-[10px] text-primary">${t.project || ''}</span>
                  <button onclick="openTaskModal('${t.id}')" class="text-muted-foreground hover:text-white"><i data-lucide="more-horizontal" class="w-4 h-4"></i></button>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    function renderGantt() {
      const tasks = globalTasks.filter(t => t.dueDate).sort((a,b) => new Date(a.dueDate) - new Date(b.dueDate));
      if(!tasks.length) return;
      const min = new Date(tasks[0].dueDate);
      const max = new Date(tasks[tasks.length-1].dueDate);
      const totalDays = Math.max(1, Math.ceil((max - min) / (86400000)) + 1);

      document.getElementById('gantt-container').innerHTML = tasks.map(t => {
        const offset = Math.ceil((new Date(t.dueDate) - min) / 86400000);
        const left = (offset / totalDays) * 100;
        return `<div class="gantt-row">
          <div class="gantt-label text-[10px] truncate">${t.title}</div>
          <div class="gantt-timeline">
            <div class="gantt-bar" style="left:${left}%; width:60px; background:${STATUS_COLORS[t.status]}"></div>
          </div>
        </div>`;
      }).join('');
    }

    function renderChart() {
      const ctx = document.getElementById('statusChart');
      if (!ctx) return;
      if (statusChartInstance) statusChartInstance.destroy();
      const counts = ["Pronto", "Trabalhando nisso", "Travado", "Não iniciado"].map(s => globalTasks.filter(t => t.status === s).length);
      statusChartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ["Pronto", "Fazendo", "Travado", "Pendente"],
          datasets: [{ data: counts, backgroundColor: Object.values(STATUS_COLORS), borderWidth: 0 }]
        },
        options: { cutout: '80%', plugins: { legend: { display: false } }, maintainAspectRatio: false }
      });
    }

    // --- AUTH OBSERVER ---
    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('auth-view').classList.add('hidden-view');
        document.getElementById('app-view').classList.remove('hidden-view');
        document.getElementById('user-display-name').innerText = user.displayName || user.email.split('@')[0];
        navigate('dashboard');
        
        onSnapshot(query(collection(db, "tasks"), where("userId", "==", user.uid)), snap => {
          globalTasks = snap.docs.map(d => ({id: d.id, ...d.data()}));
          renderDashboard();
          renderTasksList();
          if(document.getElementById('kanban-view').classList.contains('hidden-view') === false) renderKanban();
        });

        onSnapshot(query(collection(db, "projects"), where("userId", "==", user.uid)), snap => {
          globalProjects = snap.docs.map(d => ({id: d.id, ...d.data()}));
          document.getElementById('task-project').innerHTML = '<option value="">Sem Projeto</option>' + globalProjects.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
          renderDashboard();
        });
      } else {
        document.getElementById('auth-view').classList.remove('hidden-view');
        document.getElementById('app-view').classList.add('hidden-view');
        isSignUpMode = false;
      }
    });

    // --- AUTH ACTIONS (CORRIGIDO) ---
    document.getElementById('auth-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;
      
      try {
        if (isSignUpMode) {
          await createUserWithEmailAndPassword(auth, email, password);
        } else {
          await signInWithEmailAndPassword(auth, email, password);
        }
      } catch(err) {
        let errorMessage = "Erro na autenticação";
        if (err.code === 'auth/user-not-found') errorMessage = "Usuário não encontrado";
        else if (err.code === 'auth/wrong-password') errorMessage = "Senha incorreta";
        else if (err.code === 'auth/email-already-in-use') errorMessage = "Email já cadastrado";
        else if (err.code === 'auth/weak-password') errorMessage = "Senha muito fraca (mínimo 6 caracteres)";
        else if (err.code === 'auth/invalid-email') errorMessage = "Email inválido";
        
        showAuthError(errorMessage);
      }
    });

    document.getElementById('btn-toggle-auth').addEventListener('click', (e) => {
      e.preventDefault();
      toggleAuthMode();
    });

    window.logout = () => signOut(auth);

    lucide.createIcons();
  </script>
</body>
</html>
