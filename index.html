<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saturday v28 - Gestor Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --makro-red: #ED1C24;
      --makro-bg: #010816;
      --makro-card: rgba(255, 255, 255, 0.05);
    }
    body { background-color: var(--makro-bg); color: #f1f5f9; font-family: 'Montserrat', sans-serif; margin: 0; overflow: hidden; }
    .glass-card { background: var(--makro-card); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; }
    .hidden-view { display: none !important; }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--makro-red); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fadeup { animation: fadeUp 0.4s ease forwards; }

    .kanban-column { min-height: 500px; background: rgba(255, 255, 255, 0.02); border-radius: 1.5rem; border: 2px dashed transparent; transition: all 0.3s ease; }
    .kanban-column.drag-over { background: rgba(237, 28, 36, 0.05); border-color: var(--makro-red); }
    .draggable-card { cursor: grab; transition: transform 0.2s, opacity 0.2s; }
    .draggable-card:active { cursor: grabbing; }
    .dragging { opacity: 0.4; transform: scale(0.95); }

    input, select, textarea { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; outline: none !important; transition: all 0.3s; }
    input:focus, select:focus, textarea:focus { border-color: var(--makro-red) !important; box-shadow: 0 0 0 2px rgba(237, 28, 36, 0.2); }

    /* Checkbox customizado */
    input[type="checkbox"] { appearance: none; background-color: rgba(255,255,255,0.1); margin: 0; font: inherit; color: currentColor; width: 1.15em; height: 1.15em; border-radius: 0.25em; display: grid; place-content: center; cursor: pointer;}
    input[type="checkbox"]::before { content: ""; width: 0.65em; height: 0.65em; transform: scale(0); transition: 120ms transform ease-in-out; box-shadow: inset 1em 1em white; transform-origin: center; clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%); }
    input[type="checkbox"]:checked { background-color: var(--makro-red); border-color: var(--makro-red) !important; }
    input[type="checkbox"]:checked::before { transform: scale(1); }

    .label-pill { font-size: 0.6rem; font-weight: 900; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; display: inline-block; }
  </style>
</head>
<body class="antialiased">

  <div id="global-loader" class="fixed inset-0 bg-[#010816] z-[999] flex flex-col items-center justify-center transition-opacity duration-500">
    <div class="w-12 h-12 border-4 border-red-600 border-t-transparent rounded-full animate-spin mb-4"></div>
    <p class="text-xs font-black uppercase tracking-[3px] text-gray-500 animate-pulse">Carregando Workspace...</p>
  </div>

  <div id="toast-container" class="fixed bottom-8 right-8 z-[200] flex flex-col gap-2"></div>

  <div id="task-modal" class="hidden-view fixed inset-0 bg-black/80 backdrop-blur-md z-[150] flex items-center justify-center p-4">
    <div class="bg-[#010816] border border-white/10 w-full max-w-5xl rounded-3xl animate-fadeup flex flex-col max-h-[95vh] overflow-hidden shadow-2xl">
      <div class="flex justify-between items-center p-6 border-b border-white/5 bg-white/[0.02]">
        <div class="flex items-center gap-3">
          <i data-lucide="layout-template" class="text-red-500 w-5 h-5"></i>
          <h2 id="modal-title" class="text-lg font-black uppercase tracking-widest text-white">Detalhes do Card</h2>
        </div>
        <button onclick="window.closeTaskModal()" class="text-gray-500 hover:text-white transition-colors p-2 bg-white/5 hover:bg-red-600 rounded-xl"><i data-lucide="x"></i></button>
      </div>
      
      <div class="flex-1 overflow-y-auto p-6 custom-scrollbar flex flex-col md:flex-row gap-8">
        <div class="flex-1 space-y-6">
          <div>
            <label class="text-[9px] font-black uppercase opacity-40 mb-2 block tracking-widest">Título da Tarefa</label>
            <input type="text" id="task-input" placeholder="Ex: Desenvolver nova landing page..." required class="w-full p-4 rounded-xl text-lg font-bold" />
          </div>
          
          <div>
            <label class="text-[9px] font-black uppercase opacity-40 mb-2 block tracking-widest flex items-center gap-2"><i data-lucide="align-left" class="w-3 h-3"></i> Descrição</label>
            <textarea id="task-comment" placeholder="Adicione uma descrição detalhada..." class="w-full p-4 rounded-xl text-sm min-h-[120px] custom-scrollbar"></textarea>
          </div>

          <div>
            <div class="flex justify-between items-center mb-2">
              <label class="text-[9px] font-black uppercase opacity-40 block tracking-widest flex items-center gap-2"><i data-lucide="check-square" class="w-3 h-3"></i> Checklist</label>
              <span id="checklist-progress-text" class="text-[10px] font-bold text-gray-500">0%</span>
            </div>
            <div class="w-full bg-white/5 rounded-full h-2 mb-4">
               <div id="checklist-progress-bar" class="bg-emerald-500 h-2 rounded-full transition-all" style="width: 0%"></div>
            </div>
            <div id="checklist-items" class="space-y-2 mb-3"></div>
            <div class="flex gap-2">
              <input type="text" id="new-check-item" placeholder="Adicionar item..." class="flex-1 p-3 rounded-xl text-sm" onkeypress="if(event.key === 'Enter') window.addChecklistItem(event)" />
              <button type="button" onclick="window.addChecklistItem()" class="px-4 bg-white/10 hover:bg-white/20 rounded-xl font-bold text-xs transition-colors">Add</button>
            </div>
          </div>
        </div>

        <div class="w-full md:w-64 space-y-6">
          <div class="bg-white/[0.02] p-4 rounded-2xl border border-white/5 space-y-4">
            <h3 class="text-[10px] font-black uppercase opacity-40 tracking-widest mb-2 border-b border-white/5 pb-2">Configurações</h3>
            
            <div>
              <label class="text-[9px] font-bold text-gray-500 block mb-1 uppercase">Solicitante</label>
              <input type="text" id="task-requester" placeholder="Nome..." class="w-full p-3 rounded-lg text-xs" />
            </div>
            
            <div>
              <label class="text-[9px] font-bold text-gray-500 block mb-1 uppercase">Prazo</label>
              <input type="date" id="task-deadline" class="w-full p-3 rounded-lg text-xs" />
            </div>
            
            <div>
              <label class="text-[9px] font-bold text-gray-500 block mb-1 uppercase">Status</label>
              <select id="task-status" class="w-full p-3 rounded-lg text-xs cursor-pointer">
                <option value="Pendente" class="bg-[#010816]">Pendente</option>
                <option value="Em Andamento" class="bg-[#010816]">Em Andamento</option>
                <option value="Concluído" class="bg-[#010816]">Concluído</option>
              </select>
            </div>

            <div>
              <label class="text-[9px] font-bold text-gray-500 block mb-1 uppercase">Etiquetas</label>
              <div id="active-labels" class="flex flex-wrap gap-1 mb-2"></div>
              <select id="label-selector" class="w-full p-3 rounded-lg text-xs cursor-pointer" onchange="window.addLabel(this.value)">
                <option value="">+ Add Etiqueta...</option>
                <option value="red" class="bg-[#010816] text-red-500">Urgente</option>
                <option value="blue" class="bg-[#010816] text-blue-500">Revisão</option>
                <option value="yellow" class="bg-[#010816] text-yellow-500">Atenção</option>
                <option value="emerald" class="bg-[#010816] text-emerald-500">Aprovado</option>
                <option value="purple" class="bg-[#010816] text-purple-500">Design</option>
              </select>
            </div>
          </div>

          <button type="button" onclick="window.saveTask()" id="btn-save-task" class="w-full py-4 bg-red-600 hover:bg-red-700 rounded-xl font-black uppercase text-xs tracking-widest text-white transition-all shadow-lg active:scale-95 flex items-center justify-center gap-2">
            <i data-lucide="save" class="w-4 h-4"></i> Salvar Card
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="auth-view" class="hidden-view min-h-screen flex items-center justify-center bg-[#010816]">
    <div class="w-full max-w-md mx-4 glass-card p-12 text-center animate-fadeup">
      <h2 class="text-2xl font-black mb-8 tracking-tighter uppercase">Gestor Workspace</h2>
      <form id="auth-form" class="space-y-4 text-left">
        <input type="email" id="auth-email" placeholder="E-mail" required class="w-full p-4 rounded-2xl text-sm" />
        <input type="password" id="auth-password" placeholder="Senha" required class="w-full p-4 rounded-2xl text-sm" />
        <button type="submit" class="w-full bg-red-600 p-5 rounded-2xl font-black uppercase hover:bg-red-700 shadow-xl shadow-red-600/20 active:scale-95 transition-all mt-4 text-white text-sm">Entrar</button>
      </form>
      <button id="btn-google" class="w-full mt-4 p-4 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center gap-3 hover:bg-white/10 transition-all font-bold uppercase text-xs tracking-widest text-white"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18" alt="Google"> Google</button>
    </div>
  </div>

  <div id="app-view" class="hidden-view min-h-screen flex flex-col bg-[#010816]">
    <header class="h-20 border-b border-white/5 flex items-center justify-between px-6 lg:px-8 bg-black/20 backdrop-blur-md sticky top-0 z-40">
      <div class="flex items-center gap-4">
         <h2 class="font-black uppercase tracking-[3px] text-xs opacity-60"><i data-lucide="trello" class="inline w-4 h-4 mr-2 text-red-500"></i> Board Principal</h2>
      </div>
      <div class="flex items-center gap-6">
        <button onclick="window.openTaskModal()" class="flex p-3 px-6 rounded-xl bg-white/10 hover:bg-white/20 text-white text-[10px] font-black uppercase tracking-widest items-center gap-2 transition-all">
          <i data-lucide="plus" class="w-4 h-4"></i> Criar
        </button>
        <button onclick="handleLogout()" class="text-gray-500 hover:text-red-500 transition-colors"><i data-lucide="log-out" class="w-5 h-5"></i></button>
      </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
      <main class="flex-1 overflow-x-auto overflow-y-hidden p-6 custom-scrollbar bg-[#010816] flex items-start gap-6" id="board-container">
        
        <div class="w-80 flex-shrink-0 flex flex-col h-full max-h-full bg-white/[0.02] rounded-2xl border border-white/5">
          <div class="p-4 border-b border-white/5 flex justify-between items-center bg-black/20 rounded-t-2xl">
            <h3 class="font-black text-xs uppercase tracking-widest text-gray-300">A Fazer</h3>
            <span id="count-Pendente" class="text-[10px] font-black bg-white/10 px-2 py-0.5 rounded text-gray-400">0</span>
          </div>
          <div id="kanban-Pendente" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="handleDrop(event, 'Pendente')" class="p-3 space-y-3 overflow-y-auto flex-1 custom-scrollbar min-h-[100px]"></div>
        </div>

        <div class="w-80 flex-shrink-0 flex flex-col h-full max-h-full bg-white/[0.02] rounded-2xl border border-white/5">
          <div class="p-4 border-b border-blue-500/20 flex justify-between items-center bg-blue-500/5 rounded-t-2xl">
            <h3 class="font-black text-xs uppercase tracking-widest text-blue-400">Fazendo</h3>
            <span id="count-EmAndamento" class="text-[10px] font-black bg-blue-500/20 px-2 py-0.5 rounded text-blue-400">0</span>
          </div>
          <div id="kanban-EmAndamento" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="handleDrop(event, 'Em Andamento')" class="p-3 space-y-3 overflow-y-auto flex-1 custom-scrollbar min-h-[100px]"></div>
        </div>

        <div class="w-80 flex-shrink-0 flex flex-col h-full max-h-full bg-white/[0.02] rounded-2xl border border-white/5">
          <div class="p-4 border-b border-emerald-500/20 flex justify-between items-center bg-emerald-500/5 rounded-t-2xl">
            <h3 class="font-black text-xs uppercase tracking-widest text-emerald-400">Concluído</h3>
            <span id="count-Concluido" class="text-[10px] font-black bg-emerald-500/20 px-2 py-0.5 rounded text-emerald-400">0</span>
          </div>
          <div id="kanban-Concluido" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="handleDrop(event, 'Concluído')" class="p-3 space-y-3 overflow-y-auto flex-1 custom-scrollbar min-h-[100px]"></div>
        </div>

        <div class="w-80 flex-shrink-0">
          <button class="w-full p-4 rounded-2xl bg-white/5 hover:bg-white/10 border border-white/5 text-left text-xs font-bold text-gray-400 transition-colors flex items-center gap-2">
            <i data-lucide="plus" class="w-4 h-4"></i> Adicionar nova lista
          </button>
        </div>

      </main>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut, GoogleAuthProvider, signInWithPopup, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
      apiKey: "AIzaSyCGemp_OA8savCmLZfX7Us0nmDpdbpv4N0",
      authDomain: "mytasks-saturday.firebaseapp.com",
      projectId: "mytasks-saturday",
      storageBucket: "mytasks-saturday.firebasestorage.app",
      messagingSenderId: "647554172397",
      appId: "1:647554172397:web:aac3ef00938ee7cd8f13e4"
    };

    const appId = typeof __app_id !== 'undefined' ? __app_id : 'saturday-v22';
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();
    
    let user = null;
    let editingTaskId = null;
    let globalTasks = [];
    let isAuthReady = false;

    // State temporário para o Modal
    let currentChecklist = [];
    let currentLabels = [];

    const labelDefinitions = {
      red: { bg: 'bg-red-500/20', text: 'text-red-400', border: 'border-red-500/30', label: 'Urgente' },
      blue: { bg: 'bg-blue-500/20', text: 'text-blue-400', border: 'border-blue-500/30', label: 'Revisão' },
      yellow: { bg: 'bg-yellow-500/20', text: 'text-yellow-400', border: 'border-yellow-500/30', label: 'Atenção' },
      emerald: { bg: 'bg-emerald-500/20', text: 'text-emerald-400', border: 'border-emerald-500/30', label: 'Aprovado' },
      purple: { bg: 'bg-purple-500/20', text: 'text-purple-400', border: 'border-purple-500/30', label: 'Design' }
    };

    // --- Authentication ---
    onAuthStateChanged(auth, (u) => {
      user = u;
      if (user) {
        document.getElementById('auth-view').classList.add('hidden-view');
        document.getElementById('app-view').classList.remove('hidden-view');
        loadTasks();
      } else {
        document.getElementById('auth-view').classList.remove('hidden-view');
        document.getElementById('app-view').classList.add('hidden-view');
      }

      if (!isAuthReady) {
        isAuthReady = true;
        const loader = document.getElementById('global-loader');
        loader.classList.add('opacity-0');
        setTimeout(() => loader.classList.add('hidden-view'), 500);
      }
      lucide.createIcons();
    });

    document.getElementById('auth-form').onsubmit = async (e) => {
      e.preventDefault();
      try { await signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-password').value); } 
      catch (err) { showToast("Login inválido.", "error"); }
    };

    document.getElementById('btn-google').onclick = () => signInWithPopup(auth, googleProvider);
    window.handleLogout = () => signOut(auth);

    // --- Modal & Form Logic ---
    window.openTaskModal = (id = null) => {
      editingTaskId = id;
      currentChecklist = [];
      currentLabels = [];
      
      if (id) {
        const t = globalTasks.find(x => x.id === id);
        if(!t) return;
        document.getElementById('modal-title').innerText = "Editar Card";
        document.getElementById('task-input').value = t.text || t.input || '';
        document.getElementById('task-requester').value = t.requester || '';
        document.getElementById('task-deadline').value = t.deadline || '';
        document.getElementById('task-comment').value = t.comment || '';
        document.getElementById('task-status').value = t.status || 'Pendente';
        currentChecklist = t.checklist || [];
        currentLabels = t.labels || [];
      } else {
        document.getElementById('modal-title').innerText = "Novo Card";
        document.getElementById('task-input').value = '';
        document.getElementById('task-requester').value = '';
        document.getElementById('task-deadline').value = '';
        document.getElementById('task-comment').value = '';
        document.getElementById('task-status').value = 'Pendente';
      }
      
      renderChecklist();
      renderLabels();
      document.getElementById('task-modal').classList.remove('hidden-view');
      lucide.createIcons();
    };

    window.closeTaskModal = () => document.getElementById('task-modal').classList.add('hidden-view');

    // --- Checklist & Labels Engine ---
    window.addChecklistItem = (e) => {
      if(e) e.preventDefault();
      const input = document.getElementById('new-check-item');
      if(!input.value.trim()) return;
      currentChecklist.push({ text: input.value.trim(), done: false, id: Date.now().toString() });
      input.value = '';
      renderChecklist();
    };

    window.toggleCheck = (id) => {
      const item = currentChecklist.find(i => i.id === id);
      if(item) item.done = !item.done;
      renderChecklist();
    };

    window.deleteCheck = (id) => {
      currentChecklist = currentChecklist.filter(i => i.id !== id);
      renderChecklist();
    };

    function renderChecklist() {
      const container = document.getElementById('checklist-items');
      const total = currentChecklist.length;
      const done = currentChecklist.filter(i => i.done).length;
      const pct = total === 0 ? 0 : Math.round((done / total) * 100);
      
      document.getElementById('checklist-progress-text').innerText = `${pct}%`;
      document.getElementById('checklist-progress-bar').style.width = `${pct}%`;
      document.getElementById('checklist-progress-bar').className = `h-2 rounded-full transition-all ${pct === 100 ? 'bg-emerald-500' : 'bg-blue-500'}`;

      container.innerHTML = currentChecklist.map(item => `
        <div class="flex items-center gap-3 p-2 bg-white/[0.02] rounded-lg border border-white/5 hover:bg-white/5 transition-colors group">
          <input type="checkbox" ${item.done ? 'checked' : ''} onchange="window.toggleCheck('${item.id}')" />
          <span class="flex-1 text-sm ${item.done ? 'line-through opacity-40' : ''}">${item.text}</span>
          <button type="button" onclick="window.deleteCheck('${item.id}')" class="opacity-0 group-hover:opacity-100 text-gray-600 hover:text-red-500 transition-colors"><i data-lucide="trash" class="w-3.5 h-3.5"></i></button>
        </div>
      `).join('');
      lucide.createIcons();
    }

    window.addLabel = (color) => {
      if(!color || currentLabels.includes(color)) return;
      currentLabels.push(color);
      document.getElementById('label-selector').value = '';
      renderLabels();
    };

    window.removeLabel = (color) => {
      currentLabels = currentLabels.filter(c => c !== color);
      renderLabels();
    };

    function renderLabels() {
      const container = document.getElementById('active-labels');
      container.innerHTML = currentLabels.map(color => {
        const d = labelDefinitions[color];
        return `<span class="label-pill ${d.bg} ${d.text} border ${d.border} flex items-center gap-1 cursor-pointer hover:opacity-70" onclick="window.removeLabel('${color}')">${d.label} &times;</span>`;
      }).join('');
    }

    // --- Firebase Actions ---
    function getTaskPath() { return collection(db, 'artifacts', appId, 'users', user.uid, 'tasks'); }

    window.saveTask = async () => {
      if (!user) return;
      const text = document.getElementById('task-input').value.trim();
      if(!text) return showToast("O título é obrigatório.", "error");

      const data = {
        text: text,
        requester: document.getElementById('task-requester').value.trim(),
        deadline: document.getElementById('task-deadline').value,
        status: document.getElementById('task-status').value,
        comment: document.getElementById('task-comment').value.trim(),
        checklist: currentChecklist,
        labels: currentLabels
      };

      try {
        if (editingTaskId) {
          await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'tasks', editingTaskId), data);
          showToast("Card atualizado!");
        } else {
          await addDoc(getTaskPath(), { ...data, createdAt: Date.now() });
          showToast("Card criado!");
        }
        window.closeTaskModal();
      } catch (err) { showToast("Erro ao salvar.", "error"); }
    };

    function loadTasks() {
      if (!user) return;
      onSnapshot(query(getTaskPath()), (snap) => {
        globalTasks = [];
        snap.forEach(d => globalTasks.push({ id: d.id, ...d.data() }));
        globalTasks.sort((a, b) => b.createdAt - a.createdAt);
        renderKanban(globalTasks);
      });
    }

    function renderKanban(tasks) {
      const statuses = ["Pendente", "Em Andamento", "Concluído"];
      statuses.forEach(status => {
        const domId = status.replace(' ', '');
        const col = document.getElementById(`kanban-${domId}`);
        const count = document.getElementById(`count-${domId}`);
        if(!col) return;

        const filtered = tasks.filter(t => t.status === status);
        count.innerText = filtered.length;
        
        col.innerHTML = filtered.map(t => {
          const taskTitle = t.text || t.input || "Sem título";
          const overdue = isOverdue(t.deadline) && t.status !== 'Concluído';
          
          // Checklist Stats
          const checks = t.checklist || [];
          const doneChecks = checks.filter(c => c.done).length;
          const checkHtml = checks.length > 0 ? 
            `<div class="flex items-center gap-1.5 text-[9px] font-bold ${doneChecks === checks.length ? 'text-emerald-500 bg-emerald-500/10' : 'text-gray-400 bg-white/5'} px-2 py-0.5 rounded-md border border-white/5"><i data-lucide="check-square" class="w-3 h-3"></i> ${doneChecks}/${checks.length}</div>` : '';

          // Labels
          const labels = t.labels || [];
          const labelsHtml = labels.length > 0 ? 
            `<div class="flex flex-wrap gap-1 mb-2">${labels.map(l => `<span class="w-8 h-2 rounded-full ${labelDefinitions[l]?.bg || 'bg-gray-500'}"></span>`).join('')}</div>` : '';

          return `
            <div id="card-${t.id}" draggable="true" ondragstart="handleDragStart(event, '${t.id}')" ondragend="handleDragEnd('${t.id}')" onclick="if(!event.target.closest('button')) window.openTaskModal('${t.id}')"
              class="bg-[#010816] p-4 rounded-xl border border-white/10 hover:border-white/20 transition-all group animate-fadeup shadow-lg cursor-pointer">
              
              ${labelsHtml}
              
              <div class="flex justify-between items-start mb-2">
                 <p class="text-xs font-bold leading-relaxed text-gray-100">${taskTitle}</p>
                 <button onclick="event.stopPropagation(); window.deleteTask('${t.id}')" class="opacity-0 group-hover:opacity-100 text-gray-600 hover:text-red-500 transition-all p-1"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
              </div>

              ${t.comment ? `<p class="text-[9px] text-gray-500 italic line-clamp-1 mb-3">"${t.comment}"</p>` : ''}

              <div class="flex items-center justify-between pt-2 border-t border-white/5">
                 <div class="flex items-center gap-2">
                   ${checkHtml}
                 </div>
                 <div class="flex items-center gap-2 text-[9px] font-black ${overdue ? 'text-red-500 bg-red-500/10 px-2 py-0.5 rounded' : 'text-gray-500'}">
                   ${t.deadline ? `<i data-lucide="calendar" class="w-3 h-3"></i> ${formatDate(t.deadline)}` : ''}
                 </div>
              </div>
            </div>
          `;
        }).join('');
      });
      lucide.createIcons();
    }

    // --- Drag & Drop ---
    window.allowDrop = (e) => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); };
    window.dragLeave = (e) => e.currentTarget.classList.remove('drag-over');
    window.handleDragStart = (e, id) => { e.dataTransfer.setData('taskId', id); document.getElementById(`card-${id}`)?.classList.add('dragging'); };
    window.handleDragEnd = (id) => document.getElementById(`card-${id}`)?.classList.remove('dragging');
    window.handleDrop = async (e, newStatus) => {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      const taskId = e.dataTransfer.getData('taskId');
      if (!taskId || !user) return;
      try {
        await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'tasks', taskId), { status: newStatus });
      } catch (err) { showToast("Erro ao mover.", "error"); }
    };

    window.deleteTask = async (id) => {
      if(confirm("Deseja excluir este card?")) {
        await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'tasks', id));
        showToast("Card excluído.", "error");
      }
    };

    function formatDate(ds) { if(!ds) return ''; const [y, m, d] = ds.split('-'); return `${d}/${m}`; }
    function isOverdue(ds) { if(!ds) return false; const t = new Date(); t.setHours(0,0,0,0); const d = new Date(ds); d.setHours(24,0,0,0); return d < t; }
    function showToast(msg, type='success') {
      const t = document.createElement('div');
      t.className = `p-4 rounded-xl bg-[#010816] border ${type === 'error' ? 'border-red-500 text-red-400' : 'border-emerald-500 text-emerald-400'} animate-fadeup shadow-2xl text-[10px] font-black uppercase tracking-widest`;
      t.innerText = msg;
      document.getElementById('toast-container').appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
    }

    initAuth();
  </script>
</body>
</html>
