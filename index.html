<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saturday v08</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#8b5cf6">
  <link rel="icon" type="image/svg+xml" href="./gemini-svg.svg">
  <link rel="apple-touch-icon" href="./gemini-svg.svg">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: '#09090b',
            foreground: '#fafafa',
            card: '#09090b',
            primary: '#8b5cf6',
            secondary: '#27272a',
            border: '#27272a',
            muted: '#27272a',
            'muted-foreground': '#a1a1aa',
            destructive: '#ef4444',
          },
          fontFamily: { display: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>

  <style>
    body { background-color: #09090b; color: #fafafa; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
    .glass-card { background: rgba(39, 39, 42, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.75rem; }
    .fade-up { animation: fadeUp 0.5s ease-out forwards; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .hidden-view { display: none !important; }
    /* Kanban Scroll */
    .kanban-column { min-width: 280px; max-width: 320px; }
  </style>
</head>
<body class="antialiased text-foreground bg-background">

  <div id="auth-view" class="min-h-screen flex items-center justify-center relative overflow-hidden bg-[#09090b]">
    <div class="w-full max-w-md mx-4 glass-card p-6 relative z-10 fade-up text-center">
      <div class="flex items-center justify-center gap-3 mb-6">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-blue-400 flex items-center justify-center shadow-lg"><span class="text-white font-bold text-sm">S</span></div>
        <span class="text-xl font-display font-bold tracking-tight">Saturday</span>
      </div>
      <form id="auth-form" class="space-y-4 text-left">
        <input type="email" placeholder="Email" required class="w-full p-2.5 rounded-md bg-secondary/50 border border-border/50 text-white focus:outline-none focus:border-primary">
        <input type="password" placeholder="Senha" required minlength="6" class="w-full p-2.5 rounded-md bg-secondary/50 border border-border/50 text-white focus:outline-none focus:border-primary">
        <button type="submit" id="btn-submit" class="w-full p-2.5 rounded-md bg-primary hover:bg-primary/90 text-white font-medium transition-all">Entrar</button>
      </form>
      <button id="btn-google" class="w-full mt-4 p-2.5 rounded-md bg-secondary border border-border/50 text-foreground flex items-center justify-center gap-2 hover:bg-secondary/80">
        <i data-lucide="chrome" class="w-4 h-4"></i> Entrar com Google
      </button>
    </div>
  </div>

  <div id="app-view" class="hidden-view min-h-screen bg-[#09090b] flex overflow-hidden">
    <div id="mobile-overlay" class="hidden fixed inset-0 bg-black/60 z-30 md:hidden" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 transform -translate-x-full transition-transform duration-300 md:relative md:translate-x-0 border-r border-border bg-card flex flex-col">
      <div class="p-4 font-bold text-foreground flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center text-white text-xs">S</div>
        Saturday
      </div>
      <nav class="flex-1 px-3 space-y-2 mt-4">
        <button onclick="navigate('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-3 px-3 py-2 rounded-md text-muted-foreground hover:bg-secondary"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard</button>
        <button onclick="navigate('tasks')" id="nav-tasks" class="w-full flex items-center gap-3 px-3 py-2 rounded-md text-muted-foreground hover:bg-secondary"><i data-lucide="list-todo" class="w-4 h-4"></i> Minhas Tarefas</button>
        <button onclick="navigate('projects')" id="nav-projects" class="w-full flex items-center gap-3 px-3 py-2 rounded-md text-muted-foreground hover:bg-secondary"><i data-lucide="folder-kanban" class="w-4 h-4"></i> Projetos</button>
        <button onclick="navigate('analytics')" id="nav-analytics" class="w-full flex items-center gap-3 px-3 py-2 rounded-md text-muted-foreground hover:bg-secondary"><i data-lucide="bar-chart-2" class="w-4 h-4"></i> Analytics</button>
      </nav>
      <div class="p-4 border-t border-border">
        <button onclick="logout()" class="w-full flex items-center gap-3 px-3 py-2 text-destructive hover:bg-secondary rounded-md"><i data-lucide="log-out" class="w-4 h-4"></i> Sair</button>
      </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
      <header class="md:hidden flex items-center justify-between p-4 border-b border-border bg-card">
        <span class="font-bold">Saturday</span>
        <button onclick="toggleSidebar()"><i data-lucide="menu" class="w-6 h-6"></i></button>
      </header>

      <main class="flex-1 p-4 md:p-6 overflow-y-auto">
        <div id="dashboard-content" class="space-y-6 fade-up">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold">Dashboard</h1>
                <button onclick="openTaskModal()" class="bg-primary px-4 py-2 rounded-md text-sm font-medium hover:bg-primary/90">+ Nova Tarefa</button>
            </div>
            <div id="kpi-container" class="grid grid-cols-2 lg:grid-cols-4 gap-4"></div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="glass-card p-4 h-64"><canvas id="statusChart"></canvas></div>
                <div id="projects-container" class="glass-card p-4 space-y-3"></div>
                <div id="recent-container" class="glass-card p-4 space-y-2"></div>
            </div>
        </div>

        <div id="tasks-content" class="hidden-view space-y-6 fade-up">
          <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <h1 class="text-2xl font-bold">Minhas Tarefas</h1>
            <div class="flex bg-secondary p-1 rounded-md gap-1">
              <button onclick="switchTaskView('list')" id="view-list" class="p-2 rounded bg-primary text-white"><i data-lucide="list" class="w-4 h-4"></i></button>
              <button onclick="switchTaskView('kanban')" id="view-kanban" class="p-2 rounded text-muted-foreground hover:text-white"><i data-lucide="columns" class="w-4 h-4"></i></button>
              <button onclick="switchTaskView('gantt')" id="view-gantt" class="p-2 rounded text-muted-foreground hover:text-white"><i data-lucide="calendar-days" class="w-4 h-4"></i></button>
            </div>
          </div>

          <div id="tasks-view-container">
              <div id="tasks-list-container" class="space-y-3"></div>
              <div id="tasks-kanban-container" class="hidden-view flex gap-4 overflow-x-auto pb-4"></div>
              <div id="tasks-gantt-container" class="hidden-view glass-card p-8 text-center text-muted-foreground">Visão Gantt em desenvolvimento...</div>
          </div>
        </div>

        <div id="projects-content" class="hidden-view space-y-6 fade-up">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold">Projetos</h1>
                <button onclick="openProjectModal()" class="bg-primary px-4 py-2 rounded-md text-sm font-medium">+ Novo Projeto</button>
            </div>
            <div id="projects-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <div id="analytics-content" class="hidden-view fade-up p-8 text-center glass-card">
            <i data-lucide="bar-chart-2" class="w-12 h-12 mx-auto mb-4 opacity-20"></i>
            <h2 class="text-xl font-bold">Analytics em breve</h2>
            <p class="text-muted-foreground">Estamos preparando insights incríveis para você.</p>
        </div>
      </main>
    </div>
  </div>

  <div id="task-modal" class="hidden-view fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4">
    <div class="glass-card w-full max-w-md p-6 relative">
      <h2 id="task-modal-title" class="text-xl font-bold mb-4">Nova Tarefa</h2>
      <form id="new-task-form" class="space-y-4">
        <input type="hidden" id="edit-task-id">
        <input type="text" id="task-title" required class="w-full p-2 bg-secondary border border-border rounded text-white" placeholder="Título">
        <textarea id="task-desc" class="w-full p-2 bg-secondary border border-border rounded text-white" placeholder="Descrição"></textarea>
        <div class="grid grid-cols-2 gap-4">
            <select id="task-project" class="p-2 bg-secondary border border-border rounded text-white"><option value="">Sem Projeto</option></select>
            <input type="date" id="task-due-date" class="p-2 bg-secondary border border-border rounded text-white">
        </div>
        <div class="grid grid-cols-2 gap-4">
            <select id="task-status" class="p-2 bg-secondary border border-border rounded text-white">
                <option>Não iniciado</option><option>Trabalhando nisso</option><option>Travado</option><option>Pronto</option>
            </select>
            <select id="task-priority" class="p-2 bg-secondary border border-border rounded text-white">
                <option>Baixa</option><option selected>Média</option><option>Alta</option>
            </select>
        </div>
        <div class="flex gap-2">
            <button type="button" onclick="closeTaskModal()" class="flex-1 p-2 bg-secondary rounded">Cancelar</button>
            <button type="submit" class="flex-1 p-2 bg-primary rounded text-white">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="project-modal" class="hidden-view fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4">
    <div class="glass-card w-full max-w-sm p-6">
        <h2 id="project-modal-title" class="text-xl font-bold mb-4">Novo Projeto</h2>
        <form id="new-project-form" class="space-y-4">
            <input type="hidden" id="edit-project-id">
            <input type="text" id="project-name" required class="w-full p-2 bg-secondary border border-border rounded text-white" placeholder="Nome do Projeto">
            <div class="flex gap-2">
                <button type="button" onclick="closeProjectModal()" class="flex-1 p-2 bg-secondary rounded">Cancelar</button>
                <button type="submit" class="flex-1 p-2 bg-primary rounded text-white">Salvar</button>
            </div>
        </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, doc, deleteDoc, updateDoc, query, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCGemp_OA8savCmLZfX7Us0nmDpdbpv4N0",
      authDomain: "mytasks-saturday.firebaseapp.com",
      projectId: "mytasks-saturday",
      storageBucket: "mytasks-saturday.firebasestorage.app",
      messagingSenderId: "647554172397",
      appId: "1:647554172397:web:aac3ef00938ee7cd8f13e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    let tasks = [];
    let projects = [];
    let currentView = 'list';

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('auth-view').classList.add('hidden-view');
        document.getElementById('app-view').classList.remove('hidden-view');
        initData(user.uid);
      } else {
        document.getElementById('app-view').classList.add('hidden-view');
        document.getElementById('auth-view').classList.remove('hidden-view');
      }
    });

    function initData(userId) {
      onSnapshot(query(collection(db, "tasks"), where("userId", "==", userId)), (snap) => {
        tasks = snap.docs.map(d => ({id: d.id, ...d.data()}));
        render();
      });
      onSnapshot(query(collection(db, "projects"), where("userId", "==", userId)), (snap) => {
        projects = snap.docs.map(d => ({id: d.id, ...d.data()}));
        render();
      });
    }

    // --- NAVEGAÇÃO E MODAIS ---
    window.navigate = (view) => {
      ['dashboard', 'tasks', 'projects', 'analytics'].forEach(v => {
        document.getElementById(`${v}-content`).classList.add('hidden-view');
        document.getElementById(`nav-${v}`).classList.remove('bg-primary/10', 'text-primary');
      });
      document.getElementById(`${view}-content`).classList.remove('hidden-view');
      document.getElementById(`nav-${view}`).classList.add('bg-primary/10', 'text-primary');
      lucide.createIcons();
    };

    window.switchTaskView = (view) => {
      currentView = view;
      ['list', 'kanban', 'gantt'].forEach(v => {
        document.getElementById(`tasks-${v}-container`).classList.add('hidden-view');
        document.getElementById(`view-${v}`).classList.remove('bg-primary', 'text-white');
        document.getElementById(`view-${v}`).classList.add('text-muted-foreground');
      });
      document.getElementById(`tasks-${view}-container`).classList.remove('hidden-view');
      document.getElementById(`view-${view}`).classList.add('bg-primary', 'text-white');
      render();
    };

    window.openTaskModal = (task = null) => {
      const modal = document.getElementById('task-modal');
      const title = document.getElementById('task-modal-title');
      const form = document.getElementById('new-task-form');
      const select = document.getElementById('task-project');
      
      select.innerHTML = '<option value="">Sem Projeto</option>' + projects.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
      
      if(task) {
        title.innerText = "Editar Tarefa";
        document.getElementById('edit-task-id').value = task.id;
        document.getElementById('task-title').value = task.title;
        document.getElementById('task-desc').value = task.desc || "";
        document.getElementById('task-project').value = task.project || "";
        document.getElementById('task-due-date').value = task.dueDate || "";
        document.getElementById('task-status').value = task.status;
        document.getElementById('task-priority').value = task.priority;
      } else {
        title.innerText = "Nova Tarefa";
        form.reset();
        document.getElementById('edit-task-id').value = "";
      }
      modal.classList.remove('hidden-view');
    };

    window.closeTaskModal = () => document.getElementById('task-modal').classList.add('hidden-view');

    window.openProjectModal = (project = null) => {
        const modal = document.getElementById('project-modal');
        if(project) {
            document.getElementById('project-modal-title').innerText = "Editar Projeto";
            document.getElementById('edit-project-id').value = project.id;
            document.getElementById('project-name').value = project.name;
        } else {
            document.getElementById('project-modal-title').innerText = "Novo Projeto";
            document.getElementById('new-project-form').reset();
            document.getElementById('edit-project-id').value = "";
        }
        modal.classList.remove('hidden-view');
    };
    window.closeProjectModal = () => document.getElementById('project-modal').classList.add('hidden-view');

    // --- PERSISTÊNCIA ---
    document.getElementById('new-task-form').onsubmit = async (e) => {
      e.preventDefault();
      const id = document.getElementById('edit-task-id').value;
      const data = {
        title: document.getElementById('task-title').value,
        desc: document.getElementById('task-desc').value,
        project: document.getElementById('task-project').value,
        dueDate: document.getElementById('task-due-date').value,
        status: document.getElementById('task-status').value,
        priority: document.getElementById('task-priority').value,
        userId: auth.currentUser.uid,
        updatedAt: serverTimestamp()
      };
      if(id) await updateDoc(doc(db, "tasks", id), data);
      else await addDoc(collection(db, "tasks"), {...data, createdAt: serverTimestamp()});
      closeTaskModal();
    };

    document.getElementById('new-project-form').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-project-id').value;
        const name = document.getElementById('project-name').value;
        if(id) await updateDoc(doc(db, "projects", id), {name});
        else await addDoc(collection(db, "projects"), {name, userId: auth.currentUser.uid, createdAt: serverTimestamp()});
        closeProjectModal();
    };

    window.deleteTask = async (id) => confirm("Excluir tarefa?") && await deleteDoc(doc(db, "tasks", id));
    window.deleteProject = async (id) => confirm("Excluir projeto?") && await deleteDoc(doc(db, "projects", id));

    // --- RENDERIZAÇÃO ---
    function render() {
      renderDashboard();
      if(currentView === 'list') renderList();
      else if(currentView === 'kanban') renderKanban();
      renderProjects();
      lucide.createIcons();
    }

    function renderList() {
      const container = document.getElementById('tasks-list-container');
      container.innerHTML = tasks.length ? tasks.map(t => `
        <div class="glass-card p-4 flex justify-between items-center group">
          <div>
            <h3 class="font-bold">${t.title}</h3>
            <p class="text-xs text-muted-foreground">${t.project || 'Sem Projeto'} • ${t.status} • ${t.priority}</p>
          </div>
          <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
            <button onclick='openTaskModal(${JSON.stringify(t)})' class="p-2 hover:text-primary"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
            <button onclick="deleteTask('${t.id}')" class="p-2 hover:text-destructive"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
          </div>
        </div>
      `).join('') : '<p class="text-center py-10 opacity-50">Nenhuma tarefa encontrada.</p>';
    }

    function renderKanban() {
      const container = document.getElementById('tasks-kanban-container');
      const statuses = ["Não iniciado", "Trabalhando nisso", "Travado", "Pronto"];
      container.innerHTML = statuses.map(s => `
        <div class="kanban-column flex flex-col gap-3">
          <h3 class="text-xs font-bold uppercase tracking-widest text-muted-foreground mb-2">${s} (${tasks.filter(t=>t.status===s).length})</h3>
          ${tasks.filter(t=>t.status===s).map(t => `
            <div class="glass-card p-3 space-y-2 cursor-pointer hover:border-primary/50 transition-colors" onclick='openTaskModal(${JSON.stringify(t)})'>
              <h4 class="text-sm font-bold">${t.title}</h4>
              <div class="flex justify-between items-center text-[10px]">
                <span class="px-1.5 py-0.5 bg-secondary rounded">${t.priority}</span>
                <span class="text-muted-foreground">${t.dueDate || ''}</span>
              </div>
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    function renderProjects() {
        document.getElementById('projects-list-container').innerHTML = projects.map(p => `
            <div class="glass-card p-4 flex justify-between items-center">
                <span class="font-bold">${p.name}</span>
                <div class="flex gap-2">
                    <button onclick='openProjectModal(${JSON.stringify(p)})' class="p-1 hover:text-primary"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                    <button onclick="deleteProject('${p.id}')" class="p-1 hover:text-destructive"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            </div>
        `).join('');
    }

    function renderDashboard() {
        const done = tasks.filter(t=>t.status==='Pronto').length;
        document.getElementById('kpi-container').innerHTML = `
            <div class="glass-card p-4 text-center"> <p class="text-2xl font-bold">${tasks.length}</p> <p class="text-xs text-muted-foreground">Total</p> </div>
            <div class="glass-card p-4 text-center"> <p class="text-2xl font-bold text-emerald-400">${done}</p> <p class="text-xs text-muted-foreground">Concluídas</p> </div>
            <div class="glass-card p-4 text-center"> <p class="text-2xl font-bold text-primary">${tasks.length - done}</p> <p class="text-xs text-muted-foreground">Pendentes</p> </div>
            <div class="glass-card p-4 text-center"> <p class="text-2xl font-bold">${projects.length}</p> <p class="text-xs text-muted-foreground">Projetos</p> </div>
        `;
    }

    // Auth Helpers
    document.getElementById('auth-form').onsubmit = async (e) => {
      e.preventDefault();
      try { await signInWithEmailAndPassword(auth, e.target[0].value, e.target[1].value); } catch(err) { alert(err.message); }
    };
    document.getElementById('btn-google').onclick = () => signInWithPopup(auth, googleProvider);
    window.logout = () => signOut(auth);
    window.toggleSidebar = () => {
        document.getElementById('sidebar').classList.toggle('-translate-x-full');
        document.getElementById('mobile-overlay').classList.toggle('hidden');
    };

    lucide.createIcons();
  </script>
</body>
</html>
